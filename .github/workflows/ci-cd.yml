# Mycosoft CI/CD Pipeline
# Last Updated: 2026-04-06 — main-branch push: lint → test → Docker → GHCR → production deploy
# Version: 3.1.0
#
# Required GitHub Actions secrets (repo or production environment):
#   PRODUCTION_HOST, SSH_KEY or SSH_KEY_B64, SSH_USER (optional, default mycosoft)
#   CF_ACCESS_CLIENT_ID, CF_ACCESS_CLIENT_SECRET (Cloudflare Access Service Auth for SSH over tunnel)
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#   NEXTAUTH_SECRET (production cookie signing — set a strong secret)
#   Optional: SUPABASE_SERVICE_ROLE_KEY, MAS_API_URL, MINDEX_API_URL, OPENAI_API_KEY, wallet keys
#   Optional: CLOUDFLARE_ZONE_ID, CLOUDFLARE_API_TOKEN (purge after deploy)
#
# Principles (see docs/INSTANT_WEBSITE_UPDATES_FASTER_CICD_MAR15_2026.md):
#   1. Build in CI, not on the VM — image pushed to GHCR, VM only pulls + restarts
#   2. GHA layer cache — repeat builds are fast
#   3. Path filters — no full rebuild on doc-only changes
#   4. Parallel jobs — lint + test run concurrently
#   5. Smaller images — multi-stage Dockerfile, slim base

name: Mycosoft CI/CD

concurrency:
  group: ci-cd-${{ github.ref }}
  # Apr 18, 2026: cancel-in-progress is branch-aware. On main we NEVER cancel
  # an in-flight run (that's what corrupted blue/green cutovers and caused
  # multiple 502s when pushes stacked). Pushes on main QUEUE until the
  # previous deploy completes. On develop / PRs we still cancel for fast
  # iteration. Per-job `production-deploy` concurrency keeps deploys
  # serialised even if somehow a main run starts while another is active.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'hooks/**'
      - 'public/**'
      - 'services/**'
      - 'middleware.ts'
      - 'docker-compose.production.yml'
      - 'docker-compose.production.blue-green.yml'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'Dockerfile.production'
      - 'scripts/blue-green-*.sh'
      - 'scripts/deploy-*.sh'
      - 'deploy/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'tsconfig.json'
      - 'tailwind.config.*'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # CHECK IF FAST DEPLOY REQUESTED — skip full CI/CD when [fast] in commit msg
  # ===========================================================================
  check-fast:
    name: Check for fast deploy
    runs-on: ubuntu-latest
    outputs:
      is_fast: ${{ steps.check.outputs.is_fast }}
    steps:
      - name: Check commit message for [fast]
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -qiE '\[fast\]|\[instant\]|\[quick\]'; then
            echo "is_fast=true" >> "$GITHUB_OUTPUT"
            echo "Fast deploy requested — skipping full CI/CD"
          else
            echo "is_fast=false" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  # LINT AND TYPE CHECK (runs in parallel with test)
  # ===========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [check-fast]
    if: needs.check-fast.outputs.is_fast != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit || echo "::warning::TypeScript errors found (non-blocking — next.config.js has ignoreBuildErrors enabled)"

  # ===========================================================================
  # UNIT TESTS (runs in parallel with lint)
  # ===========================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [check-fast]
    if: needs.check-fast.outputs.is_fast != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (non-blocking)
        run: npm run test --if-present -- --passWithNoTests || echo "::warning::Unit tests failed - continuing to keep deploy pipeline unblocked"

      - name: WebMCP protocol schema validation (non-blocking)
        run: npm run test -- tests/webmcp --passWithNoTests || echo "::warning::WebMCP test validation failed - continuing"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always() && env.CODECOV_TOKEN != ''
        with:
          files: ./coverage/lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # BUILD DOCKER IMAGE — with GHA layer cache, push to GHCR
  # ===========================================================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [check-fast, lint, test]
    if: >-
      always()
      && needs.check-fast.outputs.is_fast != 'true'
      && needs.check-fast.result == 'success'
      && !contains(needs.lint.result, 'failure')
      && !contains(needs.test.result, 'failure')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Free disk space and add swap
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap enabled: $(swapon --show)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=production-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging-latest,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push Website
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ github.ref == 'refs/heads/main' && 'https://mycosoft.com' || 'https://sandbox.mycosoft.com' }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}

      - name: Build and push Collectors
        continue-on-error: true
        run: |
          IMAGE_NAME_LC="${IMAGE_NAME,,}"
          for service in aviation maritime satellite; do
            docker buildx build \
              --cache-from type=gha,scope=collector-${service} \
              --cache-to type=gha,scope=collector-${service},mode=max \
              --push \
              -t ${{ env.REGISTRY }}/${IMAGE_NAME_LC}-${service}:${{ github.sha }} \
              -f ./services/collectors/Dockerfile.${service} ./services/collectors
          done

  # ===========================================================================
  # INTEGRATION TESTS
  # ===========================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [check-fast, build]
    if: >-
      always()
      && needs.check-fast.outputs.is_fast != 'true'
      && needs.build.result == 'success'
      && github.event_name != 'pull_request'
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mycosoft
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mycosoft_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration --if-present
        env:
          DATABASE_URL: postgresql://mycosoft:test@localhost:5432/mycosoft_test
          REDIS_URL: redis://localhost:6379

  # ===========================================================================
  # DEPLOY TO STAGING — pull pre-built image + restart only
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [check-fast, build, integration]
    if: >-
      always()
      && needs.check-fast.outputs.is_fast != 'true'
      && needs.build.result == 'success'
      && github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout (for composite action)
        uses: actions/checkout@v4

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
          ssh-key-b64: ${{ secrets.SSH_KEY_B64 }}
          production-host: ${{ secrets.STAGING_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          require-cloudflare-access: true

      - name: Deploy to staging
        run: |
          IMAGE_NAME_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | ssh-retry production docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          ssh-retry production docker pull -q ${{ env.REGISTRY }}/${IMAGE_NAME_LC}:staging-latest
          ssh-retry production bash -s <<'DEPLOY'
            set -e
            cd /opt/mycosoft-staging
            docker compose up -d --no-build --remove-orphans
            docker compose exec -T website npm run db:migrate --if-present
          DEPLOY
          echo "Deployed ${{ github.sha }} to staging at $(date)"

  # ===========================================================================
  # DEPLOY TO PRODUCTION — pull GHCR image + restart (no build on VM)
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    needs: [check-fast, build]
    if: >-
      always()
      && needs.check-fast.outputs.is_fast != 'true'
      && needs.build.result == 'success'
      && (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'))
    permissions:
      packages: read
    environment: production
    continue-on-error: false
    timeout-minutes: 60
    steps:
      - name: Checkout (for composite action)
        uses: actions/checkout@v4

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
          ssh-key-b64: ${{ secrets.SSH_KEY_B64 }}
          production-host: ${{ secrets.PRODUCTION_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          require-cloudflare-access: true

      - name: Backup database
        continue-on-error: true
        run: |
          ssh-retry production 'cd /opt/mycosoft/website && docker compose -f docker-compose.production.yml exec -T postgres pg_dump -U mycosoft mycosoft > /backup/db-$(date +%Y%m%d-%H%M%S).sql 2>/dev/null || echo "No existing database to backup (first deploy?) — skipping"'

      - name: Sync compose file
        run: |
          ssh-retry production 'cd /opt/mycosoft/website && git fetch origin main && git checkout origin/main -- docker-compose.production.yml'

      - name: Inject environment variables
        run: |
          ssh-retry production bash -s <<'ENVSCRIPT'
            set -e
            cd /opt/mycosoft/website
            touch .env
            for var in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY MYCOSOFT_SOL_WALLET MYCOSOFT_ETH_WALLET MYCOSOFT_BTC_WALLET MAS_API_URL MINDEX_API_URL OPENAI_API_KEY; do
              sed -i "/^${var}=/d" .env
            done
          ENVSCRIPT
          ssh-retry production bash -s <<ENVSCRIPT2
            cd /opt/mycosoft/website
            echo 'NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}' >> .env
            echo 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}' >> .env
            echo 'SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' >> .env
            echo 'MYCOSOFT_SOL_WALLET=${{ secrets.MYCOSOFT_SOL_WALLET }}' >> .env
            echo 'MYCOSOFT_ETH_WALLET=${{ secrets.MYCOSOFT_ETH_WALLET }}' >> .env
            echo 'MYCOSOFT_BTC_WALLET=${{ secrets.MYCOSOFT_BTC_WALLET }}' >> .env
            echo 'MAS_API_URL=${{ secrets.MAS_API_URL }}' >> .env
            echo 'MINDEX_API_URL=${{ secrets.MINDEX_API_URL }}' >> .env
            echo 'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}' >> .env
            echo 'DATABASE_URL=postgresql://mycosoft:mycosoft@postgres:5432/mycosoft' >> .env
            echo "Env vars injected"
          ENVSCRIPT2

      - name: Blue/Green deploy (zero-downtime cutover + Cloudflare purge)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh-retry production bash -s <<BUILD
            set -euo pipefail
            cd /opt/mycosoft/website

            echo "=== Pulling latest deploy scripts + compose overlay from main ==="
            git fetch origin main
            git checkout origin/main -- \
              docker-compose.production.blue-green.yml \
              deploy/nginx/nginx.conf \
              deploy/nginx/conf.d/website.conf.template \
              scripts/blue-green-deploy.sh \
              scripts/blue-green-bootstrap.sh
            chmod +x scripts/blue-green-deploy.sh scripts/blue-green-bootstrap.sh

            echo "=== Authenticating with GHCR ==="
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            IMAGE_NAME_LC=\$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
            export IMAGE="ghcr.io/\${IMAGE_NAME_LC}:production-latest"
            echo "=== Deploying image: \$IMAGE ==="

            echo "=== First-run bootstrap (idempotent) ==="
            # If the nginx proxy container doesn't exist yet, convert the legacy
            # single-container deploy into blue/green. No-op on subsequent runs.
            if ! docker ps -a --format '{{.Names}}' | grep -qx 'mycosoft-website-proxy'; then
              echo "Blue/green not yet bootstrapped on this VM — running bootstrap"
              ./scripts/blue-green-bootstrap.sh
            fi

            echo "=== Running blue/green cutover ==="
            export CF_ZONE_ID='${{ secrets.CLOUDFLARE_ZONE_ID }}'
            export CF_API_TOKEN='${{ secrets.CLOUDFLARE_API_TOKEN }}'
            export PUBLIC_HOST='mycosoft.com'
            ./scripts/blue-green-deploy.sh
          BUILD

      - name: Run database migrations
        continue-on-error: true
        run: |
          ssh-retry production 'cd /opt/mycosoft/website && docker compose -f docker-compose.production.yml exec -T website npm run db:migrate --if-present 2>/dev/null || echo "Migration skipped (no migrations or db not ready)"'

      - name: Health check
        run: |
          ssh-retry production bash -s <<'SCRIPT'
          set -euo pipefail
          echo "=== Waiting for service to be healthy ==="
          OK=0
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:3000/api/health; then
              echo ""
              echo "Health check passed on attempt $i"
              OK=1
              break
            fi
            echo "Attempt $i: not ready, waiting 5s..."
            sleep 5
          done
          if [ "$OK" -ne 1 ]; then
            echo "::error::Health check did not pass within 25s"
            PREV_IMAGE="$(cat /tmp/mycosoft-prev-image.txt 2>/dev/null || true)"
            if [ -n "$PREV_IMAGE" ]; then
              echo "Attempting rollback to previous image: $PREV_IMAGE"
              free_host_port_3000() {
                (cd /opt/mycosoft/website && docker compose -f docker-compose.production.yml rm -sf website 2>/dev/null || true)
                for cid in $(docker ps -q --filter publish=3000 2>/dev/null); do
                  [ -z "$cid" ] && continue
                  docker stop "$cid" 2>/dev/null || true
                  docker rm -f "$cid" 2>/dev/null || true
                done
                docker rm -f website-website-1 website-website-2 mycosoft-website website-live 2>/dev/null || true
              }
              free_host_port_3000
              docker run -d --name website-live -p 3000:3000 \
                -v /opt/mycosoft/media/website/assets:/app/public/assets:ro \
                --restart unless-stopped "$PREV_IMAGE" >/dev/null 2>&1 || true
            fi
            exit 1
          fi
          SCRIPT

      - name: Purge Cloudflare cache
        if: success()
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_ZONE_ID }}" ] && [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"purge_everything":true}'
            echo "Cloudflare cache purged"
          fi

      - name: Public endpoint verification
        if: success()
        run: |
          URL="https://mycosoft.com/"
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Public endpoint healthy: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: public endpoint returned HTTP $STATUS, waiting 5s..."
            sleep 5
          done
          echo "::error::Public endpoint verification failed"
          exit 1

      - name: Log deployment
        continue-on-error: true
        run: |
          ssh production "echo '${{ github.sha }} deployed at $(date)' >> /var/log/mycosoft-deployments.log"

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1.24.0
        if: always() && env.SLACK_WEBHOOK_URL != ''
        with:
          payload: |
            {
              "text": "Mycosoft deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Mycosoft Production Deployment*\nCommit: `${{ github.sha }}`\nStatus: ${{ job.status }}\nDeploy: pull + restart (no VM build)"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # ===========================================================================
  # GENERATE CHANGELOG
  # ===========================================================================
  # ═══════════════════════════════════════════════════════════════════════════
  # INSTANT DEPLOY (Apr 18, 2026 — Option B rewrite)
  # ═══════════════════════════════════════════════════════════════════════════
  # Old approach: build on VM for [fast] commits. Took 15-30 min and left
  # nginx pointing at a dead slot whenever a new push cancelled a mid-cutover
  # deploy. That pattern caused repeated 502s.
  #
  # New approach (matches the proven non-[fast] `build` + `deploy-production`
  # pair, minus lint/test gates):
  #   Phase A  instant-build       GH runner → docker buildx (GHA cache) →
  #                                 push to GHCR as fast-${sha} + production-latest
  #                                 ~2-4 min warm cache, ~10-15 min cold.
  #   Phase B  instant-deploy      SSH to VM → docker pull → blue/green
  #                                 cutover (scripts/blue-green-deploy.sh).
  #                                 ~1-2 min. Concurrency-serialised on
  #                                 `production-deploy` so new deploys QUEUE
  #                                 instead of cancelling a live cutover.
  #
  # Why this fixes the structural 502 cause:
  #   • Top-level `concurrency.cancel-in-progress` is branch-aware; main
  #     never cancels an in-flight run.
  #   • Per-job `production-deploy` group with `cancel-in-progress: false`
  #     is the belt to the top-level suspenders.
  #   • The VM never runs `docker build`, so there's no 15-30 min window
  #     where concurrent pushes can collide with a build.
  # ═══════════════════════════════════════════════════════════════════════════

  instant-build:
    name: Instant Build (fast) — GH runner → GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [check-fast]
    if: needs.check-fast.outputs.is_fast == 'true' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=production-latest
            type=raw,value=fast-${{ github.sha }}

      - name: Build and push (GHA cache + GHCR)
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=https://mycosoft.com
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}

  instant-deploy:
    name: Instant Deploy (fast) — VM pull + blue/green cutover
    runs-on: ubuntu-latest
    concurrency:
      # KEY: Serialise all production deploys. New deploys WAIT for the
      # previous one to finish rather than cancelling it. This is what
      # closes the mid-cutover 502 hole.
      group: production-deploy
      cancel-in-progress: false
    needs: [check-fast, instant-build]
    if: needs.check-fast.outputs.is_fast == 'true' && github.ref == 'refs/heads/main' && needs.instant-build.result == 'success'
    environment: production
    # No on-VM build any more → 15 min is plenty for pull (~20s for a
    # warm base image) + cutover (~90s) + health check (~30s) + CF purge.
    timeout-minutes: 15
    steps:
      - name: Checkout (for composite action + deploy scripts)
        uses: actions/checkout@v4

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
          ssh-key-b64: ${{ secrets.SSH_KEY_B64 }}
          production-host: ${{ secrets.PRODUCTION_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          require-cloudflare-access: true

      - name: Sync deploy scripts + compose overlay from main
        run: |
          ssh-retry production bash -s <<'SCRIPT'
            set -e
            cd /opt/mycosoft/website
            git fetch origin main
            git checkout origin/main -- \
              docker-compose.production.yml \
              docker-compose.production.blue-green.yml \
              deploy/nginx/nginx.conf \
              deploy/nginx/conf.d/website.conf.template \
              scripts/blue-green-deploy.sh \
              scripts/blue-green-bootstrap.sh 2>/dev/null || true
            chmod +x scripts/blue-green-*.sh 2>/dev/null || true
            echo "Deploy scripts synced to $(git rev-parse --short origin/main)"
          SCRIPT

      - name: Inject environment variables
        run: |
          ssh-retry production bash -s <<'ENVSCRIPT'
            set -e
            cd /opt/mycosoft/website
            touch .env
            for var in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY MYCOSOFT_SOL_WALLET MYCOSOFT_ETH_WALLET MYCOSOFT_BTC_WALLET MAS_API_URL MINDEX_API_URL OPENAI_API_KEY; do
              sed -i "/^${var}=/d" .env
            done
          ENVSCRIPT
          ssh-retry production bash -s <<ENVSCRIPT2
            cd /opt/mycosoft/website
            echo 'NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}' >> .env
            echo 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}' >> .env
            echo 'SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' >> .env
            echo 'MYCOSOFT_SOL_WALLET=${{ secrets.MYCOSOFT_SOL_WALLET }}' >> .env
            echo 'MYCOSOFT_ETH_WALLET=${{ secrets.MYCOSOFT_ETH_WALLET }}' >> .env
            echo 'MYCOSOFT_BTC_WALLET=${{ secrets.MYCOSOFT_BTC_WALLET }}' >> .env
            echo 'MAS_API_URL=${{ secrets.MAS_API_URL }}' >> .env
            echo 'MINDEX_API_URL=${{ secrets.MINDEX_API_URL }}' >> .env
            echo 'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}' >> .env
            echo 'DATABASE_URL=postgresql://mycosoft:mycosoft@postgres:5432/mycosoft' >> .env
          ENVSCRIPT2

      - name: Pull GHCR image + blue/green cutover (zero-downtime)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh-retry production bash -s <<BUILD
            set -euo pipefail
            cd /opt/mycosoft/website

            echo "=== Authenticating with GHCR ==="
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            IMAGE_NAME_LC=\$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
            # Pin to the SHA tag so concurrent deploys can't mix images.
            export IMAGE="ghcr.io/\${IMAGE_NAME_LC}:fast-${{ github.sha }}"
            echo "=== Pulling: \$IMAGE ==="
            docker pull -q "\$IMAGE"

            echo "=== First-run bootstrap (idempotent) ==="
            # If blue/green hasn't been set up on this host, bootstrap once.
            if ! docker ps -a --format '{{.Names}}' | grep -qx 'mycosoft-website-proxy'; then
              echo "Blue/green not yet bootstrapped — running bootstrap"
              ./scripts/blue-green-bootstrap.sh
            fi

            echo "=== Running blue/green cutover ==="
            export CF_ZONE_ID='${{ secrets.CLOUDFLARE_ZONE_ID }}'
            export CF_API_TOKEN='${{ secrets.CLOUDFLARE_API_TOKEN }}'
            export PUBLIC_HOST='mycosoft.com'
            ./scripts/blue-green-deploy.sh
          BUILD

      - name: Run database migrations
        continue-on-error: true
        run: |
          ssh-retry production bash -s <<'SCRIPT'
            set -e
            cd /opt/mycosoft/website
            SLOT=$(cat /opt/mycosoft/state/active-slot 2>/dev/null || echo "blue")
            docker exec "mycosoft-website-${SLOT}" npm run db:migrate --if-present 2>/dev/null \
              || echo "Migration skipped (no migrations or db not ready)"
          SCRIPT

      - name: Health check (origin)
        run: |
          ssh-retry production bash -s <<'SCRIPT'
          set -e
          for i in 1 2 3 4 5 6; do
            if curl -sf http://localhost:3000/api/health; then
              echo ""
              echo "Origin health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i: not ready, waiting 5s..."
            sleep 5
          done
          echo "::error::Origin health check did not pass within 30s"
          exit 1
          SCRIPT

      - name: Purge Cloudflare cache
        if: success()
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_ZONE_ID }}" ] && [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"purge_everything":true}' \
              && echo "" && echo "Cloudflare cache purged"
          fi

      - name: Public endpoint verification
        if: success()
        run: |
          URL="https://mycosoft.com/"
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Public endpoint healthy: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: public endpoint returned HTTP $STATUS, waiting 5s..."
            sleep 5
          done
          echo "::error::Public endpoint verification failed"
          exit 1

      - name: Log deployment
        continue-on-error: true
        run: |
          ssh-retry production "echo '${{ github.sha }} (fast) deployed at $(date)' >> /var/log/mycosoft-deployments.log"

      - name: Notify deployment
        if: always()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Mycosoft Production Instant Deploy*\nCommit: `${{ github.sha }}`\nStatus: ${{ job.status }}\nMode: instant (GH runner build → GHCR → VM pull)"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [check-fast, build]
    if: >-
      always()
      && needs.check-fast.outputs.is_fast != 'true'
      && needs.build.result == 'success'
      && github.ref == 'refs/heads/main'
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update changelog [skip ci]"
          file_pattern: CHANGELOG.md

