# Mycosoft CI/CD Pipeline
# Last Updated: 2026-04-06 — main-branch push: lint → test → Docker → GHCR → production deploy
# Version: 3.1.0
#
# Required GitHub Actions secrets (repo or production environment):
#   PRODUCTION_HOST, SSH_KEY or SSH_KEY_B64, SSH_USER (optional, default mycosoft)
#   CF_ACCESS_CLIENT_ID, CF_ACCESS_CLIENT_SECRET (Cloudflare Access Service Auth for SSH over tunnel)
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#   NEXTAUTH_SECRET (production cookie signing — set a strong secret)
#   Optional: SUPABASE_SERVICE_ROLE_KEY, MAS_API_URL, MINDEX_API_URL, OPENAI_API_KEY, wallet keys
#   Optional: CLOUDFLARE_ZONE_ID, CLOUDFLARE_API_TOKEN (purge after deploy)
#
# Principles (see docs/INSTANT_WEBSITE_UPDATES_FASTER_CICD_MAR15_2026.md):
#   1. Build in CI, not on the VM — image pushed to GHCR, VM only pulls + restarts
#   2. GHA layer cache — repeat builds are fast
#   3. Path filters — no full rebuild on doc-only changes
#   4. Parallel jobs — lint + test run concurrently
#   5. Smaller images — multi-stage Dockerfile, slim base

name: Mycosoft CI/CD

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'hooks/**'
      - 'public/**'
      - 'services/**'
      - 'middleware.ts'
      - 'docker-compose.production.yml'
      - 'docker-compose.production.blue-green.yml'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'Dockerfile.production'
      - 'scripts/blue-green-*.sh'
      - 'scripts/deploy-*.sh'
      - 'deploy/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'tsconfig.json'
      - 'tailwind.config.*'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # CHECK IF FAST DEPLOY REQUESTED — skip full CI/CD when [fast] in commit msg
  # ===========================================================================
  check-fast:
    name: Check for fast deploy
    runs-on: ubuntu-latest
    outputs:
      is_fast: ${{ steps.check.outputs.is_fast }}
    steps:
      - name: Check commit message for [fast]
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -qiE '\[fast\]|\[instant\]|\[quick\]'; then
            echo "is_fast=true" >> "$GITHUB_OUTPUT"
            echo "Fast deploy requested — skipping full CI/CD"
          else
            echo "is_fast=false" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  # LINT AND TYPE CHECK (runs in parallel with test)
  # ===========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [check-fast]
    if: needs.check-fast.outputs.is_fast != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit || echo "::warning::TypeScript errors found (non-blocking — next.config.js has ignoreBuildErrors enabled)"

  # ===========================================================================
  # UNIT TESTS (runs in parallel with lint)
  # ===========================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [check-fast]
    if: needs.check-fast.outputs.is_fast != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (non-blocking)
        run: npm run test --if-present -- --passWithNoTests || echo "::warning::Unit tests failed - continuing to keep deploy pipeline unblocked"

      - name: WebMCP protocol schema validation (non-blocking)
        run: npm run test -- tests/webmcp --passWithNoTests || echo "::warning::WebMCP test validation failed - continuing"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always() && env.CODECOV_TOKEN != ''
        with:
          files: ./coverage/lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # BUILD DOCKER IMAGE — with GHA layer cache, push to GHCR
  # ===========================================================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [check-fast, lint, test]
    if: >-
      always()
      && needs.check-fast.outputs.is_fast != 'true'
      && needs.check-fast.result == 'success'
      && !contains(needs.lint.result, 'failure')
      && !contains(needs.test.result, 'failure')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space and add swap
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap enabled: $(swapon --show)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=production-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging-latest,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push Website
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ github.ref == 'refs/heads/main' && 'https://mycosoft.com' || 'https://sandbox.mycosoft.com' }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}

      - name: Build and push Collectors
        continue-on-error: true
        run: |
          IMAGE_NAME_LC="${IMAGE_NAME,,}"
          for service in aviation maritime satellite; do
            docker buildx build \
              --cache-from type=gha,scope=collector-${service} \
              --cache-to type=gha,scope=collector-${service},mode=max \
              --push \
              -t ${{ env.REGISTRY }}/${IMAGE_NAME_LC}-${service}:${{ github.sha }} \
              -f ./services/collectors/Dockerfile.${service} ./services/collectors
          done

  # ===========================================================================
  # INTEGRATION TESTS
  # ===========================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [check-fast, build]
    if: >-
      always()
      && needs.check-fast.outputs.is_fast != 'true'
      && needs.build.result == 'success'
      && github.event_name != 'pull_request'
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mycosoft
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mycosoft_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration --if-present
        env:
          DATABASE_URL: postgresql://mycosoft:test@localhost:5432/mycosoft_test
          REDIS_URL: redis://localhost:6379

  # ===========================================================================
  # DEPLOY TO STAGING — pull pre-built image + restart only
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [check-fast, build, integration]
    if: >-
      always()
      && needs.check-fast.outputs.is_fast != 'true'
      && needs.build.result == 'success'
      && github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout (for composite action)
        uses: actions/checkout@v4

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
          ssh-key-b64: ${{ secrets.SSH_KEY_B64 }}
          production-host: ${{ secrets.STAGING_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          require-cloudflare-access: true

      - name: Deploy to staging
        run: |
          IMAGE_NAME_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | ssh-retry production docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          ssh-retry production docker pull -q ${{ env.REGISTRY }}/${IMAGE_NAME_LC}:staging-latest
          ssh-retry production bash -s <<'DEPLOY'
            set -e
            cd /opt/mycosoft-staging
            docker compose up -d --no-build --remove-orphans
            docker compose exec -T website npm run db:migrate --if-present
          DEPLOY
          echo "Deployed ${{ github.sha }} to staging at $(date)"

  # ===========================================================================
  # DEPLOY TO PRODUCTION — pull GHCR image + restart (no build on VM)
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    needs: [check-fast, build]
    if: >-
      always()
      && needs.check-fast.outputs.is_fast != 'true'
      && needs.build.result == 'success'
      && (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'))
    permissions:
      packages: read
    environment: production
    continue-on-error: false
    timeout-minutes: 60
    steps:
      - name: Checkout (for composite action)
        uses: actions/checkout@v4

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
          ssh-key-b64: ${{ secrets.SSH_KEY_B64 }}
          production-host: ${{ secrets.PRODUCTION_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          require-cloudflare-access: true

      - name: Backup database
        continue-on-error: true
        run: |
          ssh-retry production 'cd /opt/mycosoft/website && docker compose -f docker-compose.production.yml exec -T postgres pg_dump -U mycosoft mycosoft > /backup/db-$(date +%Y%m%d-%H%M%S).sql 2>/dev/null || echo "No existing database to backup (first deploy?) — skipping"'

      - name: Sync compose file
        run: |
          ssh-retry production 'cd /opt/mycosoft/website && git fetch origin main && git checkout origin/main -- docker-compose.production.yml'

      - name: Inject environment variables
        run: |
          ssh-retry production bash -s <<'ENVSCRIPT'
            set -e
            cd /opt/mycosoft/website
            touch .env
            for var in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY MYCOSOFT_SOL_WALLET MYCOSOFT_ETH_WALLET MYCOSOFT_BTC_WALLET MAS_API_URL MINDEX_API_URL OPENAI_API_KEY; do
              sed -i "/^${var}=/d" .env
            done
          ENVSCRIPT
          ssh-retry production bash -s <<ENVSCRIPT2
            cd /opt/mycosoft/website
            echo 'NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}' >> .env
            echo 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}' >> .env
            echo 'SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' >> .env
            echo 'MYCOSOFT_SOL_WALLET=${{ secrets.MYCOSOFT_SOL_WALLET }}' >> .env
            echo 'MYCOSOFT_ETH_WALLET=${{ secrets.MYCOSOFT_ETH_WALLET }}' >> .env
            echo 'MYCOSOFT_BTC_WALLET=${{ secrets.MYCOSOFT_BTC_WALLET }}' >> .env
            echo 'MAS_API_URL=${{ secrets.MAS_API_URL }}' >> .env
            echo 'MINDEX_API_URL=${{ secrets.MINDEX_API_URL }}' >> .env
            echo 'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}' >> .env
            echo 'DATABASE_URL=postgresql://mycosoft:mycosoft@postgres:5432/mycosoft' >> .env
            echo "Env vars injected"
          ENVSCRIPT2

      - name: Blue/Green deploy (zero-downtime cutover + Cloudflare purge)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh-retry production bash -s <<BUILD
            set -euo pipefail
            cd /opt/mycosoft/website

            echo "=== Pulling latest deploy scripts + compose overlay from main ==="
            git fetch origin main
            git checkout origin/main -- \
              docker-compose.production.blue-green.yml \
              deploy/nginx/nginx.conf \
              deploy/nginx/conf.d/website.conf.template \
              scripts/blue-green-deploy.sh \
              scripts/blue-green-bootstrap.sh
            chmod +x scripts/blue-green-deploy.sh scripts/blue-green-bootstrap.sh

            echo "=== Authenticating with GHCR ==="
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            IMAGE_NAME_LC=\$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
            export IMAGE="ghcr.io/\${IMAGE_NAME_LC}:production-latest"
            echo "=== Deploying image: \$IMAGE ==="

            echo "=== First-run bootstrap (idempotent) ==="
            # If the nginx proxy container doesn't exist yet, convert the legacy
            # single-container deploy into blue/green. No-op on subsequent runs.
            if ! docker ps -a --format '{{.Names}}' | grep -qx 'mycosoft-website-proxy'; then
              echo "Blue/green not yet bootstrapped on this VM — running bootstrap"
              ./scripts/blue-green-bootstrap.sh
            fi

            echo "=== Running blue/green cutover ==="
            export CF_ZONE_ID='${{ secrets.CLOUDFLARE_ZONE_ID }}'
            export CF_API_TOKEN='${{ secrets.CLOUDFLARE_API_TOKEN }}'
            export PUBLIC_HOST='mycosoft.com'
            ./scripts/blue-green-deploy.sh
          BUILD

      - name: Run database migrations
        continue-on-error: true
        run: |
          ssh-retry production 'cd /opt/mycosoft/website && docker compose -f docker-compose.production.yml exec -T website npm run db:migrate --if-present 2>/dev/null || echo "Migration skipped (no migrations or db not ready)"'

      - name: Health check
        run: |
          ssh-retry production bash -s <<'SCRIPT'
          set -euo pipefail
          echo "=== Waiting for service to be healthy ==="
          OK=0
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:3000/api/health; then
              echo ""
              echo "Health check passed on attempt $i"
              OK=1
              break
            fi
            echo "Attempt $i: not ready, waiting 5s..."
            sleep 5
          done
          if [ "$OK" -ne 1 ]; then
            echo "::error::Health check did not pass within 25s"
            PREV_IMAGE="$(cat /tmp/mycosoft-prev-image.txt 2>/dev/null || true)"
            if [ -n "$PREV_IMAGE" ]; then
              echo "Attempting rollback to previous image: $PREV_IMAGE"
              free_host_port_3000() {
                (cd /opt/mycosoft/website && docker compose -f docker-compose.production.yml rm -sf website 2>/dev/null || true)
                for cid in $(docker ps -q --filter publish=3000 2>/dev/null); do
                  [ -z "$cid" ] && continue
                  docker stop "$cid" 2>/dev/null || true
                  docker rm -f "$cid" 2>/dev/null || true
                done
                docker rm -f website-website-1 website-website-2 mycosoft-website website-live 2>/dev/null || true
              }
              free_host_port_3000
              docker run -d --name website-live -p 3000:3000 \
                -v /opt/mycosoft/media/website/assets:/app/public/assets:ro \
                --restart unless-stopped "$PREV_IMAGE" >/dev/null 2>&1 || true
            fi
            exit 1
          fi
          SCRIPT

      - name: Purge Cloudflare cache
        if: success()
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_ZONE_ID }}" ] && [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"purge_everything":true}'
            echo "Cloudflare cache purged"
          fi

      - name: Public endpoint verification
        if: success()
        run: |
          URL="https://mycosoft.com/"
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Public endpoint healthy: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: public endpoint returned HTTP $STATUS, waiting 5s..."
            sleep 5
          done
          echo "::error::Public endpoint verification failed"
          exit 1

      - name: Log deployment
        continue-on-error: true
        run: |
          ssh production "echo '${{ github.sha }} deployed at $(date)' >> /var/log/mycosoft-deployments.log"

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1.24.0
        if: always() && env.SLACK_WEBHOOK_URL != ''
        with:
          payload: |
            {
              "text": "Mycosoft deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Mycosoft Production Deployment*\nCommit: `${{ github.sha }}`\nStatus: ${{ job.status }}\nDeploy: pull + restart (no VM build)"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # ===========================================================================
  # GENERATE CHANGELOG
  # ===========================================================================
  # ===========================================================================
  # INSTANT DEPLOY — triggered when [fast] is in the commit message
  # Builds directly on the VM, skipping CI lint/test/GHCR. ~2-5 min.
  # ===========================================================================
  instant-deploy:
    name: Instant Deploy (fast)
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    needs: [check-fast]
    if: needs.check-fast.outputs.is_fast == 'true' && github.ref == 'refs/heads/main'
    environment: production
    # 30 min: build-on-VM + blue/green cutover can exceed the old 15-min budget
    # for a large Next.js image. If this still isn't enough, switch to pulling
    # production-latest from GHCR instead of building on the VM.
    timeout-minutes: 30
    steps:
      - name: Checkout (for composite action)
        uses: actions/checkout@v4

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
          ssh-key-b64: ${{ secrets.SSH_KEY_B64 }}
          production-host: ${{ secrets.PRODUCTION_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          require-cloudflare-access: true

      - name: Pull latest code on VM
        run: |
          ssh-retry production bash -s <<'SCRIPT'
            set -e
            cd /opt/mycosoft/website
            git fetch origin main
            git reset --hard origin/main
            echo "Code synced to $(git rev-parse --short HEAD)"
          SCRIPT

      - name: Inject environment variables
        run: |
          ssh-retry production bash -s <<'ENVSCRIPT'
            set -e
            cd /opt/mycosoft/website
            touch .env
            for var in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY MYCOSOFT_SOL_WALLET MYCOSOFT_ETH_WALLET MYCOSOFT_BTC_WALLET MAS_API_URL MINDEX_API_URL OPENAI_API_KEY; do
              sed -i "/^${var}=/d" .env
            done
          ENVSCRIPT
          ssh-retry production bash -s <<ENVSCRIPT2
            cd /opt/mycosoft/website
            echo 'NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}' >> .env
            echo 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}' >> .env
            echo 'SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' >> .env
            echo 'MYCOSOFT_SOL_WALLET=${{ secrets.MYCOSOFT_SOL_WALLET }}' >> .env
            echo 'MYCOSOFT_ETH_WALLET=${{ secrets.MYCOSOFT_ETH_WALLET }}' >> .env
            echo 'MYCOSOFT_BTC_WALLET=${{ secrets.MYCOSOFT_BTC_WALLET }}' >> .env
            echo 'MAS_API_URL=${{ secrets.MAS_API_URL }}' >> .env
            echo 'MINDEX_API_URL=${{ secrets.MINDEX_API_URL }}' >> .env
            echo 'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}' >> .env
            echo 'DATABASE_URL=postgresql://mycosoft:mycosoft@postgres:5432/mycosoft' >> .env
          ENVSCRIPT2

      # ─────────────────────────────────────────────────────────────────────
      # BOOTSTRAP FIRST — critical for recovery. If prior cutover left nginx
      # broken (site 502ing), we MUST fix it before docker build (which can
      # hang for 30+ minutes). Bootstrap uses the image that's already on
      # the VM. The subsequent cutover step will build + promote the NEW
      # image — but even if that hangs, at least the site is back up.
      # ─────────────────────────────────────────────────────────────────────
      - name: Bootstrap (recover nginx / active-slot BEFORE build)
        timeout-minutes: 8
        run: |
          ssh-retry production bash -s <<'BOOTSTRAP'
            set -euo pipefail
            cd /opt/mycosoft/website

            echo "=== Checking docker daemon responsiveness ==="
            # A hung buildkitd from a cancelled CI run can wedge the entire
            # docker daemon — every subsequent docker/compose command hangs
            # on the containerd lock. If `docker ps` doesn't respond in 10s,
            # the daemon is dead and nothing short of restarting it will fix
            # it. Since the site is already 502 (nothing to lose), restart.
            if ! timeout 10 docker ps -q >/dev/null 2>&1; then
              echo "::warning::docker ps timed out — daemon is hung, restarting"
              # Kill buildkitd + docker-build processes first (they may be
              # the thing holding the lock).
              pgrep -x buildkitd 2>/dev/null | xargs -r sudo kill -KILL 2>/dev/null || true
              pgrep -f 'docker[- ]build' 2>/dev/null | xargs -r sudo kill -KILL 2>/dev/null || true
              sudo systemctl restart docker 2>&1 || sudo service docker restart 2>&1 || true
              # Wait up to 60s for docker to come back up.
              for i in {1..30}; do
                if timeout 5 docker ps -q >/dev/null 2>&1; then
                  echo "  docker responsive again (took ${i}×2s)"
                  break
                fi
                sleep 2
              done
              # Restart stuck containers (they'll auto-restart if unless-stopped,
              # but kick them just to be sure).
              echo "  starting base services"
              docker start mycosoft-postgres mycosoft-redis mycosoft-ollama 2>/dev/null || true
            else
              echo "  docker daemon is responsive"
            fi

            echo "=== Killing any orphan docker-build processes from prior cancelled runs ==="
            pgrep -x buildkitd 2>/dev/null | xargs -r kill -TERM 2>/dev/null || true
            pgrep -f 'docker[- ]build' 2>/dev/null | xargs -r kill -TERM 2>/dev/null || true
            pgrep -f 'docker buildx' 2>/dev/null | xargs -r kill -TERM 2>/dev/null || true
            sleep 2
            pgrep -x buildkitd 2>/dev/null | xargs -r kill -KILL 2>/dev/null || true
            pgrep -f 'docker[- ]build' 2>/dev/null | xargs -r kill -KILL 2>/dev/null || true
            # Prune builder cache with short timeout — if this hangs, skip it
            timeout 30 docker builder prune -f 2>/dev/null || echo "  builder prune timed out — continuing"

            chmod +x scripts/blue-green-bootstrap.sh scripts/blue-green-deploy.sh
            echo "=== Ensuring NAS is mounted ==="
            sudo mount -a 2>/dev/null || true
            echo "=== Bootstrap (always; idempotent — fixes nginx, recovers active slot) ==="
            # Use whatever image is CURRENTLY running in the active/idle
            # slot as WEBSITE_IMAGE. If there's no :local image, bootstrap
            # will use whichever image is already pulled.
            export WEBSITE_IMAGE="$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'mycosoft-website:(local|production-latest)' | head -1 || echo 'mycosoft-website:local')"
            echo "Using WEBSITE_IMAGE=$WEBSITE_IMAGE"
            # Wrap bootstrap in timeout so it can't hang the whole workflow.
            # Normal run is 30s-2min; if it takes more than 4 min something
            # is wrong and we want to fail fast so the next step still runs.
            timeout 240 ./scripts/blue-green-bootstrap.sh || {
              ec=$?
              echo "::warning::Bootstrap timed out or failed (exit=$ec) — attempting minimal recovery inline"
              # Minimal inline recovery: just fix nginx config + reload, without
              # touching compose. This is the shortest path to getting the site
              # back up if bootstrap itself is the thing hanging.
              STATE_DIR=/opt/mycosoft/state
              NGINX_DIR=/opt/mycosoft/nginx
              mkdir -p "$NGINX_DIR/conf.d"
              cp deploy/nginx/nginx.conf "$NGINX_DIR/nginx.conf"
              ACTIVE=$(cat "$STATE_DIR/active-slot" 2>/dev/null || echo blue)
              # Flip active if container is dead
              if ! docker ps --format '{{.Names}}' | grep -qx "mycosoft-website-$ACTIVE"; then
                OTHER=$([ "$ACTIVE" = "blue" ] && echo green || echo blue)
                if docker ps --format '{{.Names}}' | grep -qx "mycosoft-website-$OTHER"; then
                  echo "  minimal-recovery: flipping active-slot $ACTIVE -> $OTHER"
                  echo "$OTHER" > "$STATE_DIR/active-slot"
                  ACTIVE=$OTHER
                fi
              fi
              sed "s|__ACTIVE_SLOT__|$ACTIVE|g" deploy/nginx/conf.d/website.conf.template > "$NGINX_DIR/conf.d/website.conf"
              if docker ps --format '{{.Names}}' | grep -qx mycosoft-website-proxy; then
                if timeout 10 docker exec mycosoft-website-proxy nginx -t 2>&1 | grep -q "syntax is ok"; then
                  timeout 10 docker exec mycosoft-website-proxy nginx -s reload || echo "  reload failed"
                  echo "  minimal-recovery: nginx reloaded pointing at $ACTIVE"
                fi
              fi
            }
            echo "=== Bootstrap complete. Site should be up on active slot. ==="
          BOOTSTRAP

      - name: Build on VM + blue/green cutover (zero-downtime, CF purge)
        timeout-minutes: 20
        run: |
          ssh-retry production bash -s <<BUILD
            set -euo pipefail
            cd /opt/mycosoft/website

            echo "=== Building Docker image locally ==="
            # Prune dangling images to reclaim disk (common cause of hung builds)
            docker image prune -f 2>/dev/null || true
            docker builder prune -f --filter="until=24h" 2>/dev/null || true

            docker build \
              --build-arg NEXT_PUBLIC_SUPABASE_URL="\$(grep NEXT_PUBLIC_SUPABASE_URL .env | cut -d= -f2-)" \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="\$(grep NEXT_PUBLIC_SUPABASE_ANON_KEY .env | cut -d= -f2-)" \
              -f Dockerfile.production \
              -t mycosoft-website:local \
              --progress=plain \
              .

            chmod +x scripts/blue-green-deploy.sh scripts/blue-green-bootstrap.sh

            echo "=== Running blue/green cutover with local image ==="
            export IMAGE="mycosoft-website:local"
            export CF_ZONE_ID='${{ secrets.CLOUDFLARE_ZONE_ID }}'
            export CF_API_TOKEN='${{ secrets.CLOUDFLARE_API_TOKEN }}'
            export PUBLIC_HOST='mycosoft.com'
            ./scripts/blue-green-deploy.sh

            echo "=== Running Database Migrations ==="
            # Active slot is whatever the state file says after cutover
            SLOT=\$(cat /opt/mycosoft/state/active-slot 2>/dev/null || echo "blue")
            docker exec "mycosoft-website-\${SLOT}" npm run db:migrate --if-present 2>/dev/null \
              || echo "Migration skipped"

            echo "=== Instant blue/green deploy complete at \$(date) ==="
          BUILD

      - name: Health check
        run: |
          ssh-retry production bash -s <<'SCRIPT'
          set -euo pipefail
          OK=0
          for i in 1 2 3 4 5 6; do
            if curl -sf http://localhost:3000/api/health; then
              echo ""
              echo "Healthy on attempt $i"
              OK=1
              break
            fi
            sleep 5
          done
          if [ "$OK" -ne 1 ]; then
            echo "::error::Health check timeout"
            PREV_IMAGE="$(cat /tmp/mycosoft-prev-image.txt 2>/dev/null || true)"
            if [ -n "$PREV_IMAGE" ]; then
              free_host_port_3000() {
                (cd /opt/mycosoft/website && docker compose -f docker-compose.production.yml rm -sf website 2>/dev/null || true)
                for cid in $(docker ps -q --filter publish=3000 2>/dev/null); do
                  [ -z "$cid" ] && continue
                  docker stop "$cid" 2>/dev/null || true
                  docker rm -f "$cid" 2>/dev/null || true
                done
                docker rm -f website-website-1 website-website-2 mycosoft-website website-live 2>/dev/null || true
              }
              free_host_port_3000
              docker run -d --name website-live -p 3000:3000 \
                -v /opt/mycosoft/media/website/assets:/app/public/assets:ro \
                --restart unless-stopped "$PREV_IMAGE" >/dev/null 2>&1 || true
            fi
            exit 1
          fi
          SCRIPT

      - name: Purge Cloudflare cache
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_ZONE_ID }}" ] && [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"purge_everything":true}'
            echo "Cache purged"
          fi

      - name: Public endpoint verification
        if: success()
        run: |
          URL="https://mycosoft.com/"
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Public endpoint healthy: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: public endpoint returned HTTP $STATUS, waiting 5s..."
            sleep 5
          done
          echo "::error::Public endpoint verification failed"
          exit 1

      - name: Log deployment
        continue-on-error: true
        run: |
          ssh production "echo '${{ github.sha }} instant-deployed at $(date)' >> /var/log/mycosoft-deployments.log"

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1.24.0
        if: always() && env.SLACK_WEBHOOK_URL != ''
        with:
          payload: |
            {
              "text": "Mycosoft instant-deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Mycosoft Production Instant Deploy*\nCommit: `${{ github.sha }}`\nStatus: ${{ job.status }}\nMode: instant (build on VM, no CI)"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [check-fast, build]
    if: >-
      always()
      && needs.check-fast.outputs.is_fast != 'true'
      && needs.build.result == 'success'
      && github.ref == 'refs/heads/main'
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update changelog [skip ci]"
          file_pattern: CHANGELOG.md

