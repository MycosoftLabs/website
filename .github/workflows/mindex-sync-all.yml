name: MINDEX Sync-All (every 5 min)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Trigger MINDEX sync-all
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          ETL_CRON_TOKEN: ${{ secrets.ETL_CRON_TOKEN }}
        run: |
          set -e
          : "${SITE_URL:=https://mycosoft.com}"
          echo "Triggering MINDEX sync at ${SITE_URL}/api/etl/mindex-sync"
          curl -sS --fail --max-time 330 \
            -X POST "${SITE_URL}/api/etl/mindex-sync" \
            -H "x-cron-token: ${ETL_CRON_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{}" | jq '.totals // { error: .error }' || {
              echo "MINDEX sync failed (non-fatal — next run in 5 min)"
              exit 0
            }
