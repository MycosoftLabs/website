name: iNat → MINDEX delta sync

# iNaturalist delta ingestion runs on the MINDEX ETL scheduler (VM 189,
# job `inat_obs` every ~5 minutes). Website POST /api/etl/inat/sync is
# intentionally disabled (CREP_WEBSITE_ALLOW_INAT_ETL != 1) so production
# map traffic never runs iNat crawlers on the website container.
#
# This workflow verifies that migration — it does NOT POST to the disabled
# website ETL route (which returns HTTP 409).
#
# Setup: SITE_URL secret (defaults to https://mycosoft.com if unset).

on:
  schedule:
    # Hourly pipeline health check. Actual sync cadence is MINDEX ETL (~5 min).
    - cron: "0 * * * *"
  workflow_dispatch:

# Don't let multiple crons pile up
concurrency:
  group: inat-delta-sync
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify website delegates iNat ETL to MINDEX
        run: |
          set -euo pipefail
          SITE_URL="${{ secrets.SITE_URL }}"
          if [ -z "$SITE_URL" ]; then
            SITE_URL="https://mycosoft.com"
          fi

          echo "Checking $SITE_URL/api/etl/inat/sync (GET status)..."
          RESP=$(curl -fsSL "$SITE_URL/api/etl/inat/sync" --max-time 30)
          echo "$RESP" | jq .

          DISABLED=$(echo "$RESP" | jq -r '.disabled // false')
          if [ "$DISABLED" != "true" ]; then
            echo "::error::Expected website iNat ETL to be disabled (MINDEX owns sync). Got disabled=$DISABLED"
            exit 1
          fi
          echo "OK: website iNat ETL disabled — MINDEX ETL scheduler owns delta sync"

      - name: Verify MINDEX reachable via production health
        run: |
          set -euo pipefail
          SITE_URL="${{ secrets.SITE_URL }}"
          if [ -z "$SITE_URL" ]; then
            SITE_URL="https://mycosoft.com"
          fi

          echo "Checking $SITE_URL/api/health for mindex-api..."
          HEALTH=$(curl -fsSL "$SITE_URL/api/health" --max-time 45)
          echo "$HEALTH" | jq '{ status, services: [.services[] | select(.name == "mindex-api")] }'

          MINDEX_STATUS=$(echo "$HEALTH" | jq -r '.services[] | select(.name == "mindex-api") | .status')
          if [ "$MINDEX_STATUS" != "up" ]; then
            echo "::error::MINDEX API not up from production health check (status=$MINDEX_STATUS)"
            exit 1
          fi
          echo "OK: MINDEX API up — inat_obs delta sync runs on MINDEX ETL scheduler"
