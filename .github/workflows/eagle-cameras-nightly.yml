# Nightly: warm MINDEX eagle.video_sources + refresh static camera registry GeoJSON
# ==============================================================================
# Morgan / Apr 22, 2026 — replaces manual `npm run ops:warm-eagle-mindex` +
# `npm run etl:bake-cameras`. Uses production https://mycosoft.com as the fan-out
# target (same as local bakes with EAGLE_*_BASE_URL).
#
# Opens a PR when `eagle-cameras-registry.geojson` changes (see gen-cell-tower-tiles.yml).
# Merge to ship the static first-paint layer; CREP overlay still polls every 5 min.
#
# Sandbox VM alternative (no PR): run the two node commands in a shell script from
# crontab after `cd` to a git clone — you would need push credentials to update the file.
#
# Schedule: 07:00 UTC daily (~midnight Pacific). Adjust cron as needed.

name: Eagle — nightly MINDEX warm + camera registry bake

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

concurrency:
  group: eagle-cameras-nightly
  cancel-in-progress: true

env:
  EAGLE_WARM_BASE_URL: https://mycosoft.com
  EAGLE_BAKE_BASE_URL: https://mycosoft.com

jobs:
  warm-and-bake:
    name: Warm MINDEX + bake GeoJSON
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Warm MINDEX (eagle.video_sources)
        continue-on-error: true
        run: node scripts/ops/warm-eagle-mindex.mjs

      - name: Bake eagle-cameras-registry.geojson
        run: node scripts/etl/crep/bake-eagle-cameras-registry.mjs

      - name: Open PR if registry changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(crep): refresh eagle-cameras-registry.geojson (nightly)"
          title: "chore(crep): refresh eagle-cameras-registry (nightly bot)"
          body: |
            Automated refresh from production:
            - `node scripts/ops/warm-eagle-mindex.mjs` (warms MINDEX `eagle.video_sources`; best-effort if this step errors)
            - `node scripts/etl/crep/bake-eagle-cameras-registry.mjs` (rewrites `public/data/crep/eagle-cameras-registry.geojson`)

            **Merge** to update the static first-paint map layer. The overlay still polls `/api/eagle/sources` every 5 min for deltas.
          branch: bot/eagle-cameras-nightly
          delete-branch: true
