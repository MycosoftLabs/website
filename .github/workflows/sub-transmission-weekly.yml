# Weekly: refresh OSM sub-transmission geojson for CREP
# ============================================================================
# Morgan / Apr 22, 2026 — "example i see a substation with no line to it that
# doesnt make sense ... THIS NEEDS TO BE FIXED ACROSS ALL INFRA GLOBALLY".
# HIFLD only covers ≥115 kV overhead; OSM has the 69 kV sub-transmission
# feeders that connect Loveland / Jamacha / Otay / Chula Vista etc.
#
# Why weekly (not nightly): OSM updates slowly for infrastructure and
# Overpass API fair-use discourages daily global scrapes. The bake takes
# roughly 2.5–3.5 hours for a global harvest (168 tiles × ~60 s each,
# plus rate-limit pauses). GHA free-tier has a 6 h job cap which covers
# this cleanly with headroom.
#
# Opens a PR when the baked geojson changes. Merge to ship the refresh.

name: CREP — weekly OSM sub-transmission bake

on:
  schedule:
    # Sundays at 08:00 UTC (~midnight Pacific). Picks a low-traffic
    # Overpass window.
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      bbox:
        description: 'Harvest bbox (comma-separated w,s,e,n). Default: global.'
        required: false
        default: "-180,-60,180,80"
      step:
        description: 'Tile size in degrees (smaller = slower but more reliable).'
        required: false
        default: "10"

concurrency:
  group: sub-transmission-weekly
  cancel-in-progress: true

jobs:
  bake:
    name: Harvest OSM sub-transmission + write geojson
    runs-on: ubuntu-latest
    # Global harvest can run up to ~3.5 h; leave generous headroom for
    # Overpass retries. For SD+TJ only, it finishes in under 10 min.
    timeout-minutes: 320
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bake sub-transmission geojson
        env:
          BBOX: ${{ github.event.inputs.bbox || '-180,-60,180,80' }}
          STEP: ${{ github.event.inputs.step || '10' }}
        run: |
          node scripts/etl/crep/bake-osm-sub-transmission.mjs \
            --bbox="$BBOX" \
            --step="$STEP"

      - name: Report file size
        run: |
          if [ -f public/data/crep/transmission-lines-sub-transmission.geojson ]; then
            ls -lh public/data/crep/transmission-lines-sub-transmission.geojson
            node -e "const g=require('./public/data/crep/transmission-lines-sub-transmission.geojson');console.log('features:',g.features.length)"
          else
            echo "::error::bake produced no output file"
            exit 1
          fi

      - name: Open PR if geojson changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(crep): refresh sub-transmission geojson (weekly OSM bake)"
          title: "chore(crep): weekly OSM sub-transmission refresh"
          body: |
            Automated OSM sub-transmission harvest.

            Source: https://overpass-api.de (+ 3 mirrors)
            Query: `way["power"="line"]` global
            Output: `public/data/crep/transmission-lines-sub-transmission.geojson`

            This file feeds the **Sub-Transmission (OSM)** layer on CREP — the
            dashed lines that connect Loveland / Jamacha / Otay / Chula Vista
            and other ≤115 kV feeders HIFLD doesn't cover.

            **Merge** to ship the refreshed coverage. If the file shrunk
            significantly, investigate before merging — may indicate Overpass
            rate-limiting on a subset of tiles.
          branch: bot/sub-transmission-weekly
          delete-branch: true
