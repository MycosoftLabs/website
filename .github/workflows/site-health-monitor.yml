# Mycosoft Site Health Monitor & QA
# Runs every 5 minutes to verify the site, MYCA, search, and API endpoints are healthy.
# Opens a GitHub Issue automatically when critical services are down.
#
# This ensures tunnel drops, container restarts, and LLM provider outages
# are detected within minutes â€” not hours.

name: Site Health Monitor

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose output'
        required: false
        default: 'false'

env:
  SITE_URL: https://mycosoft.com
  # Fallback if the above is unreachable (Cloudflare tunnel target)
  SITE_URL_ALT: https://www.mycosoft.com
  SANDBOX_URL: https://sandbox.mycosoft.com

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check site homepage
        id: homepage
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$SITE_URL" 2>/dev/null || echo "000")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Homepage: OK ($STATUS)"
          else
            echo "::error::Homepage unreachable (HTTP $STATUS)"
          fi

      - name: Check sandbox (tunnel / staging)
        id: sandbox
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$SANDBOX_URL" 2>/dev/null || echo "000")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Sandbox: OK ($STATUS)"
          else
            echo "::warning::Sandbox unreachable (HTTP $STATUS) â€” check Cloudflare Tunnel / error 1033"
          fi

      - name: Check health API
        id: health
        run: |
          RESPONSE=$(curl -sS --max-time 10 "$SITE_URL/api/health" 2>/dev/null || echo '{"status":"unreachable"}')
          STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"')
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Health API: $STATUS"
          echo "$RESPONSE" | jq '.' 2>/dev/null || echo "$RESPONSE"

      - name: Check MYCA orchestrator API
        id: myca
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$SITE_URL/api/mas/voice/orchestrator" 2>/dev/null || echo "000")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "MYCA Orchestrator: OK ($STATUS)"
          else
            echo "::warning::MYCA Orchestrator returned HTTP $STATUS"
          fi

      - name: Check LLM providers health
        id: providers
        run: |
          RESPONSE=$(curl -sS --max-time 30 "$SITE_URL/api/health/providers" 2>/dev/null || echo '{"summary":{"status":"unreachable","working":0}}')
          PROVIDER_STATUS=$(echo "$RESPONSE" | jq -r '.summary.status // "unknown"')
          WORKING=$(echo "$RESPONSE" | jq -r '.summary.working // 0')
          echo "status=$PROVIDER_STATUS" >> "$GITHUB_OUTPUT"
          echo "working=$WORKING" >> "$GITHUB_OUTPUT"
          echo "LLM Providers: $PROVIDER_STATUS ($WORKING working)"
          echo "$RESPONSE" | jq '.providers[] | {name, status, responseTime}' 2>/dev/null || true

      - name: Test MYCA chat (smoke test)
        id: myca_chat
        run: |
          RESPONSE=$(curl -sS --max-time 30 \
            -X POST "$SITE_URL/api/mas/voice/orchestrator" \
            -H "Content-Type: application/json" \
            -d '{"message":"hello","want_audio":false,"source":"api"}' \
            2>/dev/null || echo '{"error":"unreachable"}')

          RESPONSE_TEXT=$(echo "$RESPONSE" | jq -r '.response_text // .error // "no response"' | head -c 200)
          PROVIDER=$(echo "$RESPONSE" | jq -r '.routed_to // .agent // "unknown"')
          LATENCY=$(echo "$RESPONSE" | jq -r '.latency_ms // "?"')

          # Check if we got a real response (not fallback)
          IS_FALLBACK="false"
          if echo "$RESPONSE_TEXT" | grep -qi "fallback\|connectivity issue\|unavailable\|try again"; then
            IS_FALLBACK="true"
          fi

          echo "is_fallback=$IS_FALLBACK" >> "$GITHUB_OUTPUT"
          echo "provider=$PROVIDER" >> "$GITHUB_OUTPUT"
          echo "latency=$LATENCY" >> "$GITHUB_OUTPUT"
          echo "MYCA Chat: provider=$PROVIDER latency=${LATENCY}ms fallback=$IS_FALLBACK"
          echo "Response: $RESPONSE_TEXT"

      - name: Test search API (smoke test)
        id: search
        run: |
          RESPONSE=$(curl -sS --max-time 15 \
            "$SITE_URL/api/search/ai-v2?q=what+is+mycelium" \
            2>/dev/null || echo '{"error":"unreachable"}')

          SOURCE=$(echo "$RESPONSE" | jq -r '.result.source // "none"')
          CONFIDENCE=$(echo "$RESPONSE" | jq -r '.result.confidence // 0')
          LATENCY=$(echo "$RESPONSE" | jq -r '.meta.latency // "?"')

          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "Search: source=$SOURCE confidence=$CONFIDENCE latency=${LATENCY}ms"

      - name: Evaluate results and alert
        id: evaluate
        if: always()
        env:
          HOMEPAGE_STATUS: ${{ steps.homepage.outputs.status }}
          SANDBOX_STATUS: ${{ steps.sandbox.outputs.status }}
          HEALTH_STATUS: ${{ steps.health.outputs.status }}
          MYCA_STATUS: ${{ steps.myca.outputs.status }}
          PROVIDER_STATUS: ${{ steps.providers.outputs.status }}
          PROVIDERS_WORKING: ${{ steps.providers.outputs.working }}
          MYCA_FALLBACK: ${{ steps.myca_chat.outputs.is_fallback }}
          MYCA_PROVIDER: ${{ steps.myca_chat.outputs.provider }}
          MYCA_LATENCY: ${{ steps.myca_chat.outputs.latency }}
          SEARCH_SOURCE: ${{ steps.search.outputs.source }}
        run: |
          echo "=== HEALTH SUMMARY ==="
          echo "Homepage:     HTTP $HOMEPAGE_STATUS"
          echo "Sandbox:      HTTP $SANDBOX_STATUS"
          echo "Health API:   $HEALTH_STATUS"
          echo "MYCA API:     HTTP $MYCA_STATUS"
          echo "LLM Status:   $PROVIDER_STATUS ($PROVIDERS_WORKING working)"
          echo "MYCA Chat:    provider=$MYCA_PROVIDER latency=${MYCA_LATENCY}ms fallback=$MYCA_FALLBACK"
          echo "Search:       source=$SEARCH_SOURCE"
          echo "======================"

          CRITICAL=false

          # Site completely down
          if [ "$HOMEPAGE_STATUS" = "000" ] || [ "$HOMEPAGE_STATUS" -ge 500 ] 2>/dev/null; then
            echo "::error::CRITICAL: Site is DOWN (HTTP $HOMEPAGE_STATUS)"
            CRITICAL=true
          fi

          # MYCA returning only fallback responses
          if [ "$MYCA_FALLBACK" = "true" ] && [ "$PROVIDERS_WORKING" = "0" ]; then
            echo "::error::CRITICAL: MYCA in fallback mode with 0 LLM providers working"
            CRITICAL=true
          fi

          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"

          if [ "$CRITICAL" = "true" ]; then
            echo "CRITICAL FAILURE DETECTED â€” attempting auto-recovery"
          else
            echo "All checks passed or degraded (non-critical)"
          fi

      # ================================================================
      # AUTO-RECOVERY: Restart stack via Proxmox when site is down
      # ================================================================
      - name: Auto-recover via Proxmox
        if: always() && steps.evaluate.outputs.critical == 'true'
        env:
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
          PROXMOX_URL: ${{ secrets.PROXMOX_URL }}
        run: |
          if [ -z "${PROXMOX_API_TOKEN:-}" ] || [ -z "${PROXMOX_URL:-}" ]; then
            echo "::warning::Cannot auto-recover â€” PROXMOX secrets not configured"
            exit 0
          fi

          if [[ "${PROXMOX_API_TOKEN}" == PVEAPIToken=* ]]; then
            AUTH_HEADER="${PROXMOX_API_TOKEN}"
          else
            AUTH_HEADER="PVEAPIToken=${PROXMOX_API_TOKEN}"
          fi

          BASE_ROOT="${PROXMOX_URL%/}"
          BASE_ROOT="${BASE_ROOT%%/api2/json*}"
          BASE_URL="${BASE_ROOT}/api2/json"

          # Find the VM
          NODES=$(curl -sS -k -H "Authorization: ${AUTH_HEADER}" "${BASE_URL}/nodes" | jq -r '.data[]?.node')
          NODE="" VMID=""
          for N in ${NODES}; do
            CANDIDATE=$(curl -sS -k -H "Authorization: ${AUTH_HEADER}" "${BASE_URL}/nodes/${N}/qemu" \
              | jq -r '.data[] | select(.name == "mycosoft-sandbox" or .name == "mycosoft-website" or .name == "sandbox" or .name == "website" or ((.name // "") | test("sandbox"; "i"))) | .vmid' | head -n1)
            if [ -n "${CANDIDATE}" ]; then NODE="${N}"; VMID="${CANDIDATE}"; break; fi
          done

          if [ -z "${VMID}" ]; then
            echo "::error::Could not find VM for auto-recovery"
            exit 1
          fi

          echo "Found VM ${VMID} on node ${NODE} â€” sending recovery command"
          AGENT_EXEC="${BASE_URL}/nodes/${NODE}/qemu/${VMID}/agent/exec"

          # Restart the production stack
          PAYLOAD=$(jq -n '{"command":"bash","input-data":"cd /opt/mycosoft && docker compose -f docker-compose.production.yml up -d --remove-orphans 2>&1 && echo RECOVERY_OK"}')
          PID=$(curl -sf -k -H "Authorization: ${AUTH_HEADER}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${AGENT_EXEC}" | jq -r '.data.pid // empty')

          if [ -z "${PID}" ]; then
            echo "::error::Failed to send recovery command"
            exit 1
          fi

          # Wait for recovery (max 2 min)
          AGENT_STATUS="${BASE_URL}/nodes/${NODE}/qemu/${VMID}/agent/exec-status"
          for i in $(seq 1 24); do
            sleep 5
            RESULT=$(curl -sf -k -H "Authorization: ${AUTH_HEADER}" "${AGENT_STATUS}?pid=${PID}" 2>/dev/null || echo '{}')
            EXITED=$(echo "${RESULT}" | jq -r '.data.exited // 0')
            if [ "${EXITED}" = "1" ]; then
              OUT=$(echo "${RESULT}" | jq -r '.data."out-data" // ""')
              echo "$OUT"
              if echo "$OUT" | grep -q "RECOVERY_OK"; then
                echo "Auto-recovery successful"
              else
                echo "::warning::Recovery command completed but may not have succeeded"
              fi
              break
            fi
          done

      - name: Open issue on critical failure
        if: always() && steps.evaluate.outputs.critical == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Site Health Alert: Critical failure detected (${new Date().toISOString()})`;
            const body = [
              `## Critical Health Alert`,
              ``,
              `**Time:** ${new Date().toISOString()}`,
              `**Homepage:** HTTP ${{ steps.homepage.outputs.status }}`,
              `**Sandbox:** HTTP ${{ steps.sandbox.outputs.status }}`,
              `**Health API:** ${{ steps.health.outputs.status }}`,
              `**LLM Providers:** ${{ steps.providers.outputs.working }} working`,
              `**MYCA Fallback:** ${{ steps.myca_chat.outputs.is_fallback }}`,
              ``,
              `Auto-recovery was attempted via Proxmox QEMU agent.`,
              ``,
              `Check the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.`,
            ].join('\n');

            // Check for existing open alert issues to avoid spam
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'site-health-alert',
              per_page: 1
            });

            if (issues.length > 0) {
              // Comment on existing issue instead of creating a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body
              });
              console.log(`Updated existing issue #${issues[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['site-health-alert']
              });
              console.log('Created new health alert issue');
            }
