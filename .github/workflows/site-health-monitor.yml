# Mycosoft Site Health Monitor & QA
# Runs every 5 minutes to verify the site, MYCA, search, and API endpoints are healthy.
# On CRITICAL failure: emails Morgan immediately, opens a GitHub incident issue, and
# optionally POSTs to n8n (public webhook URL only — GH runners cannot reach LAN 188).
#
# Required GitHub secrets (repo Settings → Secrets → Actions):
#   NOTIFY_EMAIL              Morgan's alert address (required for email step)
#   SMTP_SERVER               e.g. smtp.gmail.com or smtp.sendgrid.net
#   SMTP_PORT                 e.g. 587
#   SMTP_USERNAME             SMTP user or "apikey" for SendGrid
#   SMTP_PASSWORD             SMTP password or SendGrid API key
#   SMTP_FROM                 optional From header (defaults to SMTP_USERNAME)
# Optional:
#   N8N_SITE_DOWN_WEBHOOK_URL publicly reachable n8n webhook (NOT 192.168.0.x)
#
# Policy (Jun 26 2026): site must NEVER stay down — fix immediately when alerted.

name: Site Health Monitor

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose output'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write

env:
  SITE_URL: https://mycosoft.com
  # Fallback if the above is unreachable (Cloudflare tunnel target)
  SITE_URL_ALT: https://www.mycosoft.com
  SANDBOX_URL: https://sandbox.mycosoft.com

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      critical: ${{ steps.evaluate.outputs.critical }}
      summary: ${{ steps.evaluate.outputs.summary }}
    steps:
      - name: Check site homepage
        id: homepage
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$SITE_URL" 2>/dev/null || echo "000")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Homepage: OK ($STATUS)"
          else
            echo "::error::Homepage unreachable (HTTP $STATUS)"
          fi

      - name: Check sandbox (tunnel / staging)
        id: sandbox
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$SANDBOX_URL" 2>/dev/null || echo "000")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Sandbox: OK ($STATUS)"
          else
            echo "::warning::Sandbox unreachable (HTTP $STATUS) — check Cloudflare Tunnel / error 1033"
          fi

      - name: Check health API
        id: health
        run: |
          RESPONSE=$(curl -sS --max-time 10 "$SITE_URL/api/health" 2>/dev/null || echo '{"status":"unreachable"}')
          STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"')
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Health API: $STATUS"
          echo "$RESPONSE" | jq '.' 2>/dev/null || echo "$RESPONSE"

      - name: Check MYCA orchestrator API
        id: myca
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$SITE_URL/api/mas/voice/orchestrator" 2>/dev/null || echo "000")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "MYCA Orchestrator: OK ($STATUS)"
          else
            echo "::warning::MYCA Orchestrator returned HTTP $STATUS"
          fi

      - name: Check LLM providers health
        id: providers
        run: |
          RESPONSE=$(curl -sS --max-time 30 "$SITE_URL/api/health/providers" 2>/dev/null || echo '{"summary":{"status":"unreachable","working":0}}')
          PROVIDER_STATUS=$(echo "$RESPONSE" | jq -r '.summary.status // "unknown"')
          WORKING=$(echo "$RESPONSE" | jq -r '.summary.working // 0')
          echo "status=$PROVIDER_STATUS" >> "$GITHUB_OUTPUT"
          echo "working=$WORKING" >> "$GITHUB_OUTPUT"
          echo "LLM Providers: $PROVIDER_STATUS ($WORKING working)"
          echo "$RESPONSE" | jq '.providers[] | {name, status, responseTime}' 2>/dev/null || true

      - name: Test MYCA chat (smoke test)
        id: myca_chat
        run: |
          RESPONSE=$(curl -sS --max-time 30 \
            -X POST "$SITE_URL/api/mas/voice/orchestrator" \
            -H "Content-Type: application/json" \
            -d '{"message":"hello","want_audio":false,"source":"api"}' \
            2>/dev/null || echo '{"error":"unreachable"}')

          RESPONSE_TEXT=$(echo "$RESPONSE" | jq -r '.response_text // .error // "no response"' | head -c 200)
          PROVIDER=$(echo "$RESPONSE" | jq -r '.routed_to // .agent // "unknown"')
          LATENCY=$(echo "$RESPONSE" | jq -r '.latency_ms // "?"')

          # Check if we got a real response (not fallback)
          IS_FALLBACK="false"
          if echo "$RESPONSE_TEXT" | grep -qi "fallback\|connectivity issue\|unavailable\|try again"; then
            IS_FALLBACK="true"
          fi

          echo "is_fallback=$IS_FALLBACK" >> "$GITHUB_OUTPUT"
          echo "provider=$PROVIDER" >> "$GITHUB_OUTPUT"
          echo "latency=$LATENCY" >> "$GITHUB_OUTPUT"
          echo "MYCA Chat: provider=$PROVIDER latency=${LATENCY}ms fallback=$IS_FALLBACK"
          echo "Response: $RESPONSE_TEXT"

      - name: Test search API (smoke test)
        id: search
        run: |
          RESPONSE=$(curl -sS --max-time 15 \
            "$SITE_URL/api/search/ai-v2?q=what+is+mycelium" \
            2>/dev/null || echo '{"error":"unreachable"}')

          SOURCE=$(echo "$RESPONSE" | jq -r '.result.source // "none"')
          CONFIDENCE=$(echo "$RESPONSE" | jq -r '.result.confidence // 0')
          LATENCY=$(echo "$RESPONSE" | jq -r '.meta.latency // "?"')

          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "Search: source=$SOURCE confidence=$CONFIDENCE latency=${LATENCY}ms"

      - name: Evaluate results and alert
        id: evaluate
        if: always()
        env:
          HOMEPAGE_STATUS: ${{ steps.homepage.outputs.status }}
          SANDBOX_STATUS: ${{ steps.sandbox.outputs.status }}
          HEALTH_STATUS: ${{ steps.health.outputs.status }}
          MYCA_STATUS: ${{ steps.myca.outputs.status }}
          PROVIDER_STATUS: ${{ steps.providers.outputs.status }}
          PROVIDERS_WORKING: ${{ steps.providers.outputs.working }}
          MYCA_FALLBACK: ${{ steps.myca_chat.outputs.is_fallback }}
          MYCA_PROVIDER: ${{ steps.myca_chat.outputs.provider }}
          MYCA_LATENCY: ${{ steps.myca_chat.outputs.latency }}
          SEARCH_SOURCE: ${{ steps.search.outputs.source }}
        run: |
          echo "=== HEALTH SUMMARY ==="
          echo "Homepage:     HTTP $HOMEPAGE_STATUS"
          echo "Sandbox:      HTTP $SANDBOX_STATUS"
          echo "Health API:   $HEALTH_STATUS"
          echo "MYCA API:     HTTP $MYCA_STATUS"
          echo "LLM Status:   $PROVIDER_STATUS ($PROVIDERS_WORKING working)"
          echo "MYCA Chat:    provider=$MYCA_PROVIDER latency=${MYCA_LATENCY}ms fallback=$MYCA_FALLBACK"
          echo "Search:       source=$SEARCH_SOURCE"
          echo "======================"

          CRITICAL=false
          SUMMARY="prod=$HOMEPAGE_STATUS sandbox=$SANDBOX_STATUS health=$HEALTH_STATUS myca=$MYCA_STATUS"

          # Production site completely down
          if [ "$HOMEPAGE_STATUS" = "000" ] || [ "$HOMEPAGE_STATUS" -ge 500 ] 2>/dev/null; then
            echo "::error::CRITICAL: mycosoft.com is DOWN (HTTP $HOMEPAGE_STATUS)"
            CRITICAL=true
          fi

          # Sandbox down (tunnel 1033 / proxy bypass) — treat as CRITICAL per Jun 26 policy
          if [ "$SANDBOX_STATUS" = "000" ] || [ "$SANDBOX_STATUS" -ge 500 ] 2>/dev/null; then
            echo "::error::CRITICAL: sandbox.mycosoft.com is DOWN (HTTP $SANDBOX_STATUS)"
            CRITICAL=true
          fi

          # MYCA returning only fallback responses
          if [ "$MYCA_FALLBACK" = "true" ] && [ "$PROVIDERS_WORKING" = "0" ]; then
            echo "::error::CRITICAL: MYCA in fallback mode with 0 LLM providers working"
            CRITICAL=true
          fi

          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

          if [ "$CRITICAL" = "true" ]; then
            echo "CRITICAL FAILURE DETECTED — notify-on-down will email Morgan"
            exit 1
          fi

          echo "All checks passed or degraded (non-critical)"

  notify-on-down:
    name: Notify Morgan (site down)
    needs: health-check
    if: failure() && needs.health-check.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # secrets can't be used in step `if:` — surface them as env (allowed in `if:`).
    env:
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      N8N_SITE_DOWN_WEBHOOK_URL: ${{ secrets.N8N_SITE_DOWN_WEBHOOK_URL }}
    steps:
      - name: Build alert body
        id: alert
        env:
          SUMMARY: ${{ needs.health-check.outputs.summary }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(cat <<EOF
          URGENT — Mycosoft site health monitor detected CRITICAL failure.

          Summary: ${SUMMARY:-see workflow log}
          Workflow: Site Health Monitor
          Run: ${RUN_URL}
          Time (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          Policy: fix immediately — do not leave site down.
          Common causes: nginx proxy bypassed on VM 187, wrong docker network, tunnel 1033.
          EOF
          )
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"

      - name: Email Morgan (SMTP)
        if: ${{ env.NOTIFY_EMAIL != '' && env.SMTP_SERVER != '' }}
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🔴 URGENT: Mycosoft site DOWN — health monitor"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}
          body: ${{ steps.alert.outputs.body }}

      - name: n8n webhook (optional, must be public URL)
        if: ${{ env.N8N_SITE_DOWN_WEBHOOK_URL != '' }}
        env:
          WEBHOOK: ${{ secrets.N8N_SITE_DOWN_WEBHOOK_URL }}
        run: |
          curl -sfS -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg event site_down \
              --arg source site-health-monitor \
              --arg summary "${{ needs.health-check.outputs.summary }}" \
              --arg run_url "${{ steps.alert.outputs.run_url }}" \
              --arg notify "${{ secrets.NOTIFY_EMAIL }}" \
              '{event:$event,source:$source,summary:$summary,run_url:$run_url,notify_email:$notify,severity:"critical"}')" \
            || echo "::warning::n8n webhook failed (URL must be public — GH cannot reach 192.168.0.188)"

      - name: Open GitHub incident issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🔴 SITE DOWN — health monitor (${new Date().toISOString().slice(0, 16)}Z)`;
            const body = `${{ steps.alert.outputs.body }}`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "site-down",
              per_page: 5,
            });
            if (open.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body: `Monitor re-fired:\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["site-down", "incident", "urgent"],
              });
            }
