# Instant Deploy — GH runner build → GHCR → VM pull → blue/green cutover
# ============================================================================
# Apr 23, 2026 rewrite.
# Previous implementation built the Docker image ON the VM and hit the
# 15-min timeout whenever the image grew (last run: 24811980320 cancelled
# after 15m while building with ~3 MB of new CREP geojson bundles).
#
# New path mirrors the proven `instant-build` + `instant-deploy` pair
# inside ci-cd.yml (gated there behind an is_fast flag):
#
#   Phase A  build-image      GH runner (16 cores) → docker buildx →
#                              push ghcr.io/mycosoftlabs/website:
#                                 fast-${sha}, manual-${sha}, latest
#                              GHA build cache keeps repeat builds ~2-4 min
#                              warm / 10-15 min cold.
#   Phase B  deploy-vm        SSH to VM → docker pull → blue/green
#                              cutover via scripts/blue-green-deploy.sh
#                              ~1-2 min. Concurrency-serialised on
#                              `production-deploy` so new runs QUEUE
#                              instead of cancelling a live cutover.
#
# Why:
#   - VM never runs `docker build`, so it can't time out on a big image.
#   - Concurrency group shared with ci-cd.yml's production-deploy job so
#     instant-deploy + push-triggered CI can't stomp on each other.
#   - 45-min total budget — plenty for cold cache on a fat image.
#
# Use this workflow when you want to ship a known-good main commit without
# waiting for the full lint + test + integration pipeline. Triggered from
# the Actions tab → Instant Deploy → Run workflow.
#
# Production environment secrets (GitHub → Settings → Environments → production):
#   MINDEX_API_URL=http://192.168.0.189:8000  (not localhost — web container has no MINDEX on :8000)
#   MINDEX_API_KEY=… if MAS proxy requires it
#   AIRNOW_API_KEY=… for /api/crep/airnow/* (optional; no key in repo)
#   MAS_API_URL, NEXT_PUBLIC_*, etc. — see ci-cd.yml header

name: Instant Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (default: main)'
        required: false
        default: 'main'
      skip_build:
        description: 'Skip build + just pull the latest production-latest tag + cutover'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      no_cache:
        description: 'Force full Docker rebuild (disables GHA BuildKit cache — use when prod serves stale routes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  # Same group name as ci-cd.yml's instant-deploy job — so a manual
  # instant-deploy waits for any in-flight push-triggered deploy.
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─── Phase A: build the image on a GH runner and push to GHCR ────────
  build-image:
    name: Build on GH runner → push to GHCR
    if: inputs.skip_build != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}
      deploy_sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          lfs: false

      - name: Free disk space (no-cache full rebuild needs ~20GB headroom)
        if: inputs.no_cache == 'true'
        run: |
          set -euo pipefail
          echo "=== Disk before cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af --volumes || true
          echo "=== Disk after cleanup ==="
          df -h

      - name: Hydrate bundled CREP PMTiles without Git LFS
        run: |
          set -euo pipefail
          TILE="public/data/crep/tiles/transmission-lines-us-full.pmtiles"
          if [ ! -s "$TILE" ] || head -c 64 "$TILE" | grep -q "version https://git-lfs.github.com/spec"; then
            mkdir -p "$(dirname "$TILE")"
            curl -fL --retry 3 --retry-delay 5 \
              -o "$TILE" \
              "https://mycosoft.com/api/crep/tiles/transmission-lines-us-full.pmtiles" || true
          fi
          if [ "$(wc -c < "$TILE")" -le 1000000 ]; then
            echo "::warning::transmission-lines-us-full.pmtiles is not hydrated; continuing because this deploy does not modify CREP tiles."
          fi

      - name: Resolve deploy SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      # no_cache full Next.js builds exceed default runner disk (~14GB free).
      - name: Free disk space on runner
        if: inputs.no_cache == 'true'
        uses: jlumbroso/free-disk-space-action@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=production-latest
            type=raw,value=manual-${{ steps.sha.outputs.sha }}
            type=raw,value=fast-${{ steps.sha.outputs.sha }}

      - name: Build and push (GHA cache + GHCR)
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          no-cache: ${{ inputs.no_cache == 'true' }}
          provenance: false
          sbom: false
          # Share the GHA cache with ci-cd.yml's instant-build so a
          # push-triggered deploy followed by an instant-deploy hits
          # warm cache on the second run. no_cache=true skips cache entirely.
          cache-from: ${{ inputs.no_cache != 'true' && 'type=gha' || '' }}
          cache-to: ${{ inputs.no_cache != 'true' && 'type=gha,mode=max' || '' }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ steps.sha.outputs.sha }}
            SOURCE_COMMIT=${{ steps.sha.outputs.sha }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=https://mycosoft.com
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXT_PUBLIC_CESIUM_ION_TOKEN=${{ secrets.NEXT_PUBLIC_CESIUM_ION_TOKEN }}
            NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
            NEXT_PUBLIC_GOOGLE_MAP_TILES_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_TILES_API_KEY }}

  # ─── Phase B: VM pulls the image and runs blue/green cutover ─────────
  deploy-vm:
    name: VM pull + blue/green cutover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    # Wait for the build phase UNLESS caller asked for skip_build, in
    # which case we go straight to VM pull of production-latest.
    needs: [build-image]
    if: always() && (needs.build-image.result == 'success' || inputs.skip_build == 'true')
    steps:
      - name: Checkout (for composite action + deploy scripts)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
          ssh-key-b64: ${{ secrets.SSH_KEY_B64 }}
          production-host: ${{ secrets.PRODUCTION_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          require-cloudflare-access: true

      - name: Sync deploy scripts + compose overlay from target ref
        run: |
          ssh-retry production bash -s <<'SCRIPT'
            set -e
            cd /opt/mycosoft/website
            TARGET_REF='${{ inputs.ref || 'main' }}'
            git fetch origin "$TARGET_REF" || git fetch origin
            git checkout "origin/$TARGET_REF" -- \
              docker-compose.production.yml \
              docker-compose.production.blue-green.yml \
              deploy/nginx/nginx.conf \
              deploy/nginx/conf.d/website.conf.template \
              scripts/blue-green-deploy.sh \
              scripts/blue-green-bootstrap.sh \
              scripts/vm-production-cleanup.sh 2>/dev/null || \
            git checkout "$TARGET_REF" -- \
              docker-compose.production.yml \
              docker-compose.production.blue-green.yml \
              deploy/nginx/nginx.conf \
              deploy/nginx/conf.d/website.conf.template \
              scripts/blue-green-deploy.sh \
              scripts/blue-green-bootstrap.sh \
              scripts/vm-production-cleanup.sh 2>/dev/null || true
            chmod +x scripts/blue-green-*.sh 2>/dev/null || true
            echo "Deploy scripts synced to $(git rev-parse --short HEAD)"
          SCRIPT

      - name: Inject environment variables
        run: |
          ssh-retry production bash -s <<'ENVSCRIPT'
            set -e
            cd /opt/mycosoft/website
            touch .env
            for var in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY MYCOSOFT_SOL_WALLET MYCOSOFT_ETH_WALLET MYCOSOFT_BTC_WALLET; do
              sed -i "/^${var}=/d" .env
            done
          ENVSCRIPT
          ssh-retry production bash -s <<ENVSCRIPT2
            cd /opt/mycosoft/website
            set_secret() {
              key="\$1"
              val="\$2"
              if [ -n "\$val" ]; then
                sed -i "/^\${key}=/d" .env
                printf '%s=%s\n' "\$key" "\$val" >> .env
              elif grep -q "^\${key}=" .env; then
                echo "\${key} preserved from existing production .env"
              else
                echo "::warning::\${key} is not set in GitHub secrets or production .env"
              fi
            }
            echo 'NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}' >> .env
            echo 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}' >> .env
            echo 'SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' >> .env
            echo 'MYCOSOFT_SOL_WALLET=${{ secrets.MYCOSOFT_SOL_WALLET }}' >> .env
            echo 'MYCOSOFT_ETH_WALLET=${{ secrets.MYCOSOFT_ETH_WALLET }}' >> .env
            echo 'MYCOSOFT_BTC_WALLET=${{ secrets.MYCOSOFT_BTC_WALLET }}' >> .env
            set_secret MAS_API_URL '${{ secrets.MAS_API_URL }}'
            set_secret NEXT_PUBLIC_MAS_API_URL '${{ secrets.NEXT_PUBLIC_MAS_API_URL }}'
            set_secret MINDEX_API_URL '${{ secrets.MINDEX_API_URL }}'
            set_secret NEXT_PUBLIC_MINDEX_API_URL '${{ secrets.NEXT_PUBLIC_MINDEX_API_URL }}'
            set_secret MINDEX_API_KEY '${{ secrets.MINDEX_API_KEY }}'
            set_secret OPENAI_API_KEY '${{ secrets.OPENAI_API_KEY }}'
            set_secret AIRNOW_API_KEY '${{ secrets.AIRNOW_API_KEY }}'
            set_secret TRANSIT_511_API_KEY '${{ secrets.TRANSIT_511_API_KEY }}'
            set_secret SF_511_API_KEY '${{ secrets.SF_511_API_KEY }}'
            set_secret GLOBAL_FISHING_WATCH_TOKEN '${{ secrets.GLOBAL_FISHING_WATCH_TOKEN }}'
            set_secret YOUTUBE_API_KEY '${{ secrets.YOUTUBE_API_KEY }}'
            set_secret NEXT_PUBLIC_GOOGLE_MAP_TILES_API_KEY '${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_TILES_API_KEY }}'
            if [ -n '${{ secrets.DATABASE_URL }}' ]; then
              echo 'DATABASE_URL=${{ secrets.DATABASE_URL }}' >> .env
            fi
          ENVSCRIPT2

      - name: Clean production VM before deploy (disk + memory)
        continue-on-error: true
        run: |
          ssh-retry production bash -s <<'CLEANUP'
            set -euo pipefail
            cd /opt/mycosoft/website
            chmod +x scripts/vm-production-cleanup.sh 2>/dev/null || true
            if [[ -x scripts/vm-production-cleanup.sh ]]; then
              ./scripts/vm-production-cleanup.sh
            else
              echo "::warning::vm-production-cleanup.sh not found — skipping"
            fi
          CLEANUP

      - name: Pull GHCR image + blue/green cutover
        run: |
          ssh-retry production bash -s <<BUILD
            set -euo pipefail
            cd /opt/mycosoft/website

            echo "=== Authenticating with GHCR ==="
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            IMAGE_NAME_LC=\$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
            # Pin to a specific tag — manual-<sha> if we built it, else production-latest
            if [ '${{ inputs.skip_build }}' = 'true' ]; then
              export IMAGE="ghcr.io/\${IMAGE_NAME_LC}:production-latest"
            else
              export IMAGE="ghcr.io/\${IMAGE_NAME_LC}:manual-${{ needs.build-image.outputs.deploy_sha }}"
            fi
            echo "=== Pulling: \$IMAGE ==="
            docker pull -q "\$IMAGE"

            echo "=== First-run bootstrap (idempotent) ==="
            if ! docker ps -a --format '{{.Names}}' | grep -qx 'mycosoft-website-proxy'; then
              echo "Blue/green not yet bootstrapped — running bootstrap"
              ./scripts/blue-green-bootstrap.sh
            fi

            echo "=== Blue/green cutover ==="
            export CF_ZONE_ID='${{ secrets.CLOUDFLARE_ZONE_ID }}'
            export CF_API_TOKEN='${{ secrets.CLOUDFLARE_API_TOKEN }}'
            export PUBLIC_HOST='mycosoft.com'
            export LOCK_DIR="\$HOME/.cache/mycosoft-deploy"
            export LOCK_FILE="\$LOCK_DIR/blue-green.lock"
            mkdir -p "\$LOCK_DIR"
            ./scripts/blue-green-deploy.sh

            echo "=== Ensure autoheal sidecar is running (self-heal for hung app slots) ==="
            docker compose -f docker-compose.production.yml -f docker-compose.production.blue-green.yml --env-file .env up -d autoheal || echo "::warning::autoheal start failed (non-fatal)"

            echo "=== Verifying deployed search QA route on origin ==="
            curl -fsS --max-time 20 http://localhost:3000/api/search/qa/artifact?limit=1 >/tmp/search-qa-artifact.json
            grep -q '"scenarioCount":1' /tmp/search-qa-artifact.json
          BUILD

      - name: Health check (origin)
        run: |
          ssh-retry production bash -s <<'SCRIPT'
            set -e
            for i in 1 2 3 4 5 6 7 8; do
              if curl -sf http://localhost:3000/api/health; then
                echo ""
                echo "Healthy on attempt $i"
                exit 0
              fi
              sleep 5
            done
            echo "::warning::Health check timeout (nginx may still be serving the old slot)"
          SCRIPT

      - name: Purge Cloudflare cache
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_ZONE_ID }}" ] && [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"purge_everything":true}'
            echo "Cache purged"
          fi

      - name: Verify Earth Simulator routes on public origin
        run: |
          set -euo pipefail
          echo "=== Entity stream BFF (mode=entities) ==="
          stream_head=$(curl -sS --max-time 8 "https://mycosoft.com/api/stream/crep?mode=entities" | head -c 400 || true)
          echo "$stream_head"
          echo "$stream_head" | grep -q "Entity stream BFF connected" || {
            echo "::error::Prod still serving old CREP stream handler — rebuild with no_cache=true"
            exit 1
          }
          echo "=== Capped unified bundle size ==="
          unified_bytes=$(curl -sS --max-time 120 -o /tmp/unified.json -w '%{size_download}' \
            "https://mycosoft.com/api/crep/unified?refresh=true")
          echo "unified bytes=$unified_bytes"
          if [ "$unified_bytes" -gt 1200000 ]; then
            echo "::error::Unified payload still oversized (${unified_bytes}B > 1.2MB) — slim caps not live"
            exit 1
          fi
          echo "=== Earth Simulator page ==="
          curl -fsS --max-time 20 -o /dev/null -w "earth-simulator HTTP %{http_code}\n" \
            "https://mycosoft.com/natureos/earth-simulator"

      - name: Append deploy log
        continue-on-error: true
        run: |
          ssh-retry production bash -s <<SCRIPT
            set -e
            mkdir -p "\$HOME/mycosoft-logs"
            echo "[\$(date -u +%FT%TZ)] instant-deploy manual ref=${{ inputs.ref || 'main' }} sha=${{ needs.build-image.outputs.deploy_sha || 'skip_build' }} actor=${{ github.actor }}" >> "\$HOME/mycosoft-deployments.log"
          SCRIPT
