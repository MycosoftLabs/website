# Fast Deploy — Skip build, just pull existing image and restart
# Use when: compose file changed, env vars changed, or you just need to restart
# Image must already exist in GHCR (built by ci-cd.yml)
name: Fast Deploy

concurrency:
  group: production-deploy
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: production-latest)'
        required: false
        default: 'production-latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      packages: read
    environment: production
    timeout-minutes: 30
    steps:
      - name: Checkout (for compose file sync)
        uses: actions/checkout@v4

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
          ssh-key-b64: ${{ secrets.SSH_KEY_B64 }}
          production-host: ${{ secrets.PRODUCTION_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          require-cloudflare-access: true

      - name: Sync compose file
        run: |
          ssh-retry production 'cd /opt/mycosoft/website && git fetch origin main && git checkout origin/main -- docker-compose.production.yml'

      - name: Inject environment variables
        run: |
          ssh-retry production bash -s <<'ENVSCRIPT'
            set -e
            cd /opt/mycosoft/website
            touch .env
            for var in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY MYCOSOFT_SOL_WALLET MYCOSOFT_ETH_WALLET MYCOSOFT_BTC_WALLET; do
              sed -i "/^${var}=/d" .env
            done
          ENVSCRIPT
          ssh-retry production bash -s <<ENVSCRIPT2
            cd /opt/mycosoft/website
            echo 'NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}' >> .env
            echo 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}' >> .env
            echo 'SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' >> .env
            echo 'MYCOSOFT_SOL_WALLET=${{ secrets.MYCOSOFT_SOL_WALLET }}' >> .env
            echo 'MYCOSOFT_ETH_WALLET=${{ secrets.MYCOSOFT_ETH_WALLET }}' >> .env
            echo 'MYCOSOFT_BTC_WALLET=${{ secrets.MYCOSOFT_BTC_WALLET }}' >> .env
            echo "Env vars injected"
          ENVSCRIPT2

      # Apr 23, 2026 — Morgan: "you need to prevent data from building up
      # in sandbox for builds that will kill resources especially in fixes
      # and deployments this needs to be cleaned autonomously when
      # deployments". The sandbox VM was hanging at "Pull image and deploy"
      # because old image tags + stale buildx cache + zombie containers
      # were eating disk. This step runs BEFORE the new docker pull so
      # the VM has free space + clean state every deploy.
      - name: Clean sandbox VM before deploy (autonomous)
        continue-on-error: true
        run: |
          ssh-retry production bash -s <<'CLEANUP'
            set -uo pipefail
            echo "=== Disk BEFORE cleanup ==="
            df -h / /var/lib/docker 2>/dev/null || df -h /

            # 1. Stop any zombie deploys (stale flocks from hung SSH sessions).
            #    flock -u releases; if the lock is held by a dead PID the
            #    kernel already freed it, this is belt-and-suspenders.
            if [ -f /tmp/mycosoft-prod-deploy.lock ]; then
              fuser -k /tmp/mycosoft-prod-deploy.lock 2>/dev/null || true
              rm -f /tmp/mycosoft-prod-deploy.lock
              echo "Cleared stale deploy lock."
            fi

            # 2. Remove containers stopped >15 min (old blue/green slots +
            #    crashed/restart-loop containers from previous deploys).
            docker container prune -f --filter "until=15m" 2>/dev/null || true

            # 3. Remove our own image history beyond the 3 most recent tags.
            #    Keep `production-latest`, `previous`, and the current run's
            #    commit SHA — everything else is disposable rollback ballast.
            KEEP_TAGS="production-latest previous"
            mapfile -t ALL_TAGS < <(docker images \
              --filter "reference=ghcr.io/mycosoftlabs/website:*" \
              --format '{{.Repository}}:{{.Tag}}\t{{.CreatedAt}}' \
              | sort -k2 -r | awk '{print $1}')
            KEEP_COUNT=0
            for tag in "${ALL_TAGS[@]}"; do
              base="${tag##*:}"
              if echo "$KEEP_TAGS" | grep -qw "$base" || [ "$KEEP_COUNT" -lt 3 ]; then
                KEEP_COUNT=$((KEEP_COUNT + 1))
                continue
              fi
              docker image rm "$tag" 2>/dev/null || true
            done

            # 4. Prune dangling (untagged intermediate layers) + unused
            #    volumes. `-a` on image prune only removes images not
            #    referenced by any container — safe.
            docker image prune -af --filter "until=24h" 2>/dev/null || true
            docker volume prune -f 2>/dev/null || true
            docker network prune -f --filter "until=1h" 2>/dev/null || true

            # 5. Buildx build cache — if buildkit was ever enabled on the
            #    VM this can be gigabytes of stale layer cache.
            docker buildx prune -af --filter "until=24h" 2>/dev/null || true

            # 6. Old deploy logs (>14 days) — we keep two weeks for
            #    incident review, older is noise.
            find /var/log/mycosoft-deploys.log* -mtime +14 -delete 2>/dev/null || true
            find /tmp -name "mycosoft-*.log" -mtime +3 -delete 2>/dev/null || true

            # 7. APT cache — Ubuntu will happily hoard hundreds of MB here.
            sudo apt-get clean 2>/dev/null || true
            sudo journalctl --vacuum-time=7d 2>/dev/null || true

            echo "=== Disk AFTER cleanup ==="
            df -h / /var/lib/docker 2>/dev/null || df -h /
            echo "=== Container count ==="
            docker ps -a --format '{{.Names}} {{.Status}}' | wc -l
          CLEANUP

      - name: Pull image and deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_NAME_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${IMAGE_NAME_LC}:${{ github.event.inputs.image_tag }}"

          echo "${GH_TOKEN}" | ssh-retry production docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          ssh-retry production docker pull -q "${IMAGE}"

          ssh-retry production bash -s <<DEPLOY
            set -euo pipefail
            exec 9>/tmp/mycosoft-prod-deploy.lock
            flock -n 9 || { echo "Another production deployment is already running"; exit 1; }
            cd /opt/mycosoft/website

            # Capture previous Next.js image for rollback. In blue/green mode
            # the container publishing :3000 is nginx:1.27-alpine (the proxy),
            # which MUST NOT be used as a rollback image (nginx listens on :80,
            # not :3000 → Cloudflare 502). Filter out nginx/proxy images and
            # only accept a Next.js image (ghcr.io/mycosoftlabs/website:* or
            # the local mycosoft-always-on-* tag maintained by
            # _rebuild_sandbox.py).
            PREV_IMAGE=\$(docker ps --filter "publish=3000" --format '{{.Image}}' \\
              | grep -vE '^(nginx|mycosoft-website-proxy)' \\
              | grep -E '(ghcr\.io/mycosoftlabs/website|mycosoft-always-on)' \\
              | head -1 || true)
            # Multi-layer fallback if no valid image currently publishes :3000.
            if [ -z "\${PREV_IMAGE}" ]; then
              if docker image inspect mycosoft-always-on-mycosoft-website:previous >/dev/null 2>&1; then
                PREV_IMAGE="mycosoft-always-on-mycosoft-website:previous"
              elif docker image inspect ghcr.io/mycosoftlabs/website:production-latest >/dev/null 2>&1; then
                PREV_IMAGE="ghcr.io/mycosoftlabs/website:production-latest"
              fi
            fi
            echo "PREV_IMAGE resolved to: \${PREV_IMAGE:-<none>}"
            echo "\${PREV_IMAGE}" >/tmp/mycosoft-prev-image.txt
            export WEBSITE_IMAGE="${IMAGE}"
            free_host_port_3000() {
              echo "=== Freeing host :3000 (compose website + all publishers) ==="
              docker compose -f docker-compose.production.yml rm -sf website 2>/dev/null || true
              for cid in \$(docker ps -q --filter publish=3000 2>/dev/null); do
                [ -z "\$cid" ] && continue
                docker stop "\$cid" 2>/dev/null || true
                docker rm -f "\$cid" 2>/dev/null || true
              done
              docker rm -f website-website-1 website-website-2 mycosoft-website website-live 2>/dev/null || true
            }

            # Rollback docker run — matches _rebuild_sandbox.py exactly: Next.js
            # image, --env-file, NAS mount, host.docker.internal for MAS/MINDEX/
            # MycoBrain, full production URL env. Container name is
            # mycosoft-website (NOT website-live) so free_host_port_3000 and
            # _rebuild_sandbox.py both clean it up on the next deploy.
            rollback_to_prev_image() {
              local img="\$1"
              [ -z "\$img" ] && { echo "::error::No rollback image available"; return 1; }
              if echo "\$img" | grep -qE '^(nginx|mycosoft-website-proxy)'; then
                echo "::error::Refusing to roll back to non-Next.js image: \$img"
                return 1
              fi
              echo "=== Rolling back :3000 to \$img (mycosoft-website pattern) ==="
              free_host_port_3000
              docker run -d --name mycosoft-website -p 3000:3000 \\
                --add-host=host.docker.internal:host-gateway \\
                -v /opt/mycosoft/media/website/assets:/app/public/assets:ro \\
                --env-file /opt/mycosoft/website/.env \\
                -e NODE_ENV=production \\
                -e PORT=3000 \\
                -e HOSTNAME=0.0.0.0 \\
                -e NEXT_PUBLIC_BASE_URL=https://mycosoft.com \\
                -e NEXTAUTH_URL=https://mycosoft.com \\
                -e NEXT_PUBLIC_SITE_URL=https://mycosoft.com \\
                -e MAS_API_URL=http://host.docker.internal:8001 \\
                -e MINDEX_API_URL=http://host.docker.internal:8000 \\
                -e OLLAMA_BASE_URL=http://host.docker.internal:11434 \\
                -e N8N_URL=http://host.docker.internal:5678 \\
                -e MYCOBRAIN_SERVICE_URL=http://host.docker.internal:8999 \\
                -e MYCOBRAIN_API_URL=http://host.docker.internal:8999 \\
                --restart unless-stopped "\$img"
            }

            # Apr 20, 2026 (Morgan: "site always 100% needs to be up updates
            # need to switch over only after fix is good no site can ever
            # come down"). HARD REQUIREMENT: blue/green zero-downtime
            # cutover is the ONLY permitted deploy path. If the overlay
            # file or the script isn't on the VM, REFUSE to deploy — do
            # not fall back to kill-then-start.
            #
            # scripts/blue-green-deploy.sh invariants:
            #   • Start IDLE slot with new image (old slot keeps serving)
            #   • Wait 3× consecutive /api/health passes (max 180 s)
            #   • Flip nginx → new slot (instant, atomic reload)
            #   • Purge Cloudflare cache
            #   • Public verify (mycosoft.com must return 2xx from new slot)
            #   • 300 s rollback window, then stop old slot
            #   • Rollback: restores previous slot + reloads nginx if any
            #     step after the flip fails.
            # If ANY step fails before the flip, old slot keeps serving
            # → zero downtime, zero customer impact.
            if [ ! -x scripts/blue-green-deploy.sh ] || \\
               [ ! -f docker-compose.production.blue-green.yml ]; then
              echo "::error::Blue/green deploy artifacts missing on VM."
              echo "::error::  scripts/blue-green-deploy.sh  present: \$([ -x scripts/blue-green-deploy.sh ] && echo yes || echo NO)"
              echo "::error::  docker-compose.production.blue-green.yml present: \$([ -f docker-compose.production.blue-green.yml ] && echo yes || echo NO)"
              echo "::error::REFUSING to deploy via kill-then-start path. Run"
              echo "::error::  cd /opt/mycosoft/website && git checkout origin/main --"
              echo "::error::  scripts/blue-green-deploy.sh scripts/blue-green-bootstrap.sh"
              echo "::error::  docker-compose.production.blue-green.yml"
              echo "::error::on the VM, then re-run Fast Deploy."
              exit 1
            fi
            echo "=== Blue/green zero-downtime cutover (scripts/blue-green-deploy.sh) ==="
            export DEPLOY_DIR="/opt/mycosoft/website"
            export IMAGE="${IMAGE}"
            export CF_ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"
            export CF_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
            export PUBLIC_HOST="mycosoft.com"
            if ! scripts/blue-green-deploy.sh; then
              echo "::error::Blue/green cutover failed. Old slot is still serving — site stayed up."
              echo "::error::See /var/log/mycosoft-deploys.log on VM 187 for the step that failed."
              exit 1
            fi
          DEPLOY

      - name: Health check
        run: |
          ssh-retry production bash -s <<'SCRIPT'
          set -euo pipefail
          OK=0
          for i in 1 2 3 4 5 6; do
            if curl -sf http://localhost:3000/api/health; then
              echo ""
              echo "Health check passed on attempt $i"
              OK=1
              break
            fi
            echo "Attempt $i: not ready, waiting 5s..."
            sleep 5
          done
          if [ "$OK" -ne 1 ]; then
            echo "::error::Health check did not pass within 30s"
            # Read the Next.js rollback image captured in the Pull-and-deploy
            # step. The capture there already excluded nginx/proxy images, so
            # this file should hold a Next.js image or be empty. Still double-
            # check here for defence-in-depth.
            PREV_IMAGE="$(cat /tmp/mycosoft-prev-image.txt 2>/dev/null || true)"
            if echo "$PREV_IMAGE" | grep -qE '^(nginx|mycosoft-website-proxy)'; then
              echo "::warning::Refusing rollback to non-Next.js image: $PREV_IMAGE"
              PREV_IMAGE=""
            fi
            if [ -z "$PREV_IMAGE" ]; then
              if docker image inspect mycosoft-always-on-mycosoft-website:previous >/dev/null 2>&1; then
                PREV_IMAGE="mycosoft-always-on-mycosoft-website:previous"
              elif docker image inspect ghcr.io/mycosoftlabs/website:production-latest >/dev/null 2>&1; then
                PREV_IMAGE="ghcr.io/mycosoftlabs/website:production-latest"
              fi
            fi
            if [ -n "$PREV_IMAGE" ]; then
              echo "=== Rolling back :3000 to $PREV_IMAGE (mycosoft-website pattern) ==="
              (cd /opt/mycosoft/website && docker compose -f docker-compose.production.yml rm -sf website 2>/dev/null || true)
              for cid in $(docker ps -q --filter publish=3000 2>/dev/null); do
                [ -z "$cid" ] && continue
                docker stop "$cid" 2>/dev/null || true
                docker rm -f "$cid" 2>/dev/null || true
              done
              docker rm -f website-website-1 website-website-2 mycosoft-website website-live 2>/dev/null || true
              # Match _rebuild_sandbox.py docker run: Next.js image, --env-file,
              # NAS mount, host.docker.internal for MAS/MINDEX/MycoBrain, full
              # production URL env. Container name mycosoft-website.
              docker run -d --name mycosoft-website -p 3000:3000 \
                --add-host=host.docker.internal:host-gateway \
                -v /opt/mycosoft/media/website/assets:/app/public/assets:ro \
                --env-file /opt/mycosoft/website/.env \
                -e NODE_ENV=production \
                -e PORT=3000 \
                -e HOSTNAME=0.0.0.0 \
                -e NEXT_PUBLIC_BASE_URL=https://mycosoft.com \
                -e NEXTAUTH_URL=https://mycosoft.com \
                -e NEXT_PUBLIC_SITE_URL=https://mycosoft.com \
                -e MAS_API_URL=http://host.docker.internal:8001 \
                -e MINDEX_API_URL=http://host.docker.internal:8000 \
                -e OLLAMA_BASE_URL=http://host.docker.internal:11434 \
                -e N8N_URL=http://host.docker.internal:5678 \
                -e MYCOBRAIN_SERVICE_URL=http://host.docker.internal:8999 \
                -e MYCOBRAIN_API_URL=http://host.docker.internal:8999 \
                --restart unless-stopped "$PREV_IMAGE" >/dev/null 2>&1 || \
                echo "::warning::Rollback docker run failed; :3000 may be empty"
            else
              echo "::warning::No valid rollback image available; :3000 left empty"
            fi
            exit 1
          fi
          SCRIPT

      - name: Public endpoint verification
        if: success()
        run: |
          URL="https://mycosoft.com/"
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Public endpoint healthy: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: public endpoint returned HTTP $STATUS, waiting 5s..."
            sleep 5
          done
          echo "::error::Public endpoint verification failed"
          exit 1

      - name: Purge Cloudflare cache
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_ZONE_ID }}" ] && [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"purge_everything":true}'
            echo "Cloudflare cache purged"
          fi
