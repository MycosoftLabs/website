# Fast Deploy — Skip build, just pull existing image and restart
# Use when: compose file changed, env vars changed, or you just need to restart
# Image must already exist in GHCR (built by ci-cd.yml)
name: Fast Deploy

concurrency:
  group: production-deploy
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: production-latest)'
        required: false
        default: 'production-latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      packages: read
    environment: production
    timeout-minutes: 30
    steps:
      - name: Checkout (for compose file sync)
        uses: actions/checkout@v4

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
          ssh-key-b64: ${{ secrets.SSH_KEY_B64 }}
          production-host: ${{ secrets.PRODUCTION_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          require-cloudflare-access: true

      - name: Sync compose file
        run: |
          ssh-retry production 'cd /opt/mycosoft/website && git fetch origin main && git checkout origin/main -- docker-compose.production.yml'

      - name: Inject environment variables
        run: |
          ssh-retry production bash -s <<'ENVSCRIPT'
            set -e
            cd /opt/mycosoft/website
            touch .env
            for var in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY MYCOSOFT_SOL_WALLET MYCOSOFT_ETH_WALLET MYCOSOFT_BTC_WALLET; do
              sed -i "/^${var}=/d" .env
            done
          ENVSCRIPT
          ssh-retry production bash -s <<ENVSCRIPT2
            cd /opt/mycosoft/website
            echo 'NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}' >> .env
            echo 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}' >> .env
            echo 'SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' >> .env
            echo 'MYCOSOFT_SOL_WALLET=${{ secrets.MYCOSOFT_SOL_WALLET }}' >> .env
            echo 'MYCOSOFT_ETH_WALLET=${{ secrets.MYCOSOFT_ETH_WALLET }}' >> .env
            echo 'MYCOSOFT_BTC_WALLET=${{ secrets.MYCOSOFT_BTC_WALLET }}' >> .env
            echo "Env vars injected"
          ENVSCRIPT2

      - name: Pull image and deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_NAME_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${IMAGE_NAME_LC}:${{ github.event.inputs.image_tag }}"

          echo "${GH_TOKEN}" | ssh-retry production docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          ssh-retry production docker pull -q "${IMAGE}"

          ssh-retry production bash -s <<DEPLOY
            set -e
            cd /opt/mycosoft/website
            export WEBSITE_IMAGE="${IMAGE}"
            docker rm -f mycosoft-website 2>/dev/null || true
            docker compose -f docker-compose.production.yml up -d --no-build --remove-orphans website
          DEPLOY

      - name: Health check
        run: |
          ssh-retry production bash -s <<'SCRIPT'
          OK=0
          for i in 1 2 3 4 5 6; do
            if curl -sf http://localhost:3000/api/health; then
              echo ""
              echo "Health check passed on attempt $i"
              OK=1
              break
            fi
            echo "Attempt $i: not ready, waiting 5s..."
            sleep 5
          done
          if [ "$OK" -ne 1 ]; then
            echo "::error::Health check did not pass within 30s"
            exit 1
          fi
          SCRIPT

      - name: Public endpoint verification
        if: success()
        run: |
          URL="https://mycosoft.com/"
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Public endpoint healthy: HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: public endpoint returned HTTP $STATUS, waiting 5s..."
            sleep 5
          done
          echo "::error::Public endpoint verification failed"
          exit 1

      - name: Purge Cloudflare cache
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_ZONE_ID }}" ] && [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"purge_everything":true}'
            echo "Cloudflare cache purged"
          fi
