# =============================================================================
# Reusable SSH Setup — Cloudflare Tunnel + ssh-retry
# =============================================================================
# Standardized across ALL deploy workflows. Handles:
#   - SSH_KEY (raw PEM) or SSH_KEY_B64 (base64-encoded) — auto-detected
#   - Cloudflared installation and SSH ProxyCommand config
#   - ssh-retry wrapper with exponential backoff (5 attempts, 20s→320s)
#   - Secret validation with clear error messages
#   - Tunnel connectivity diagnostics
#
# Usage in a workflow:
#   - uses: ./.github/actions/setup-ssh
#     with:
#       ssh-key: ${{ secrets.SSH_KEY }}
#       ssh-key-b64: ${{ secrets.SSH_KEY_B64 }}
#       production-host: ${{ secrets.PRODUCTION_HOST }}
#       ssh-user: ${{ secrets.SSH_USER }}
#       cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
#       cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
#       require-cloudflare-access: true   # fail fast if Access secrets missing (recommended for deploy jobs)
#
# If SSH is behind Cloudflare Zero Trust Access, CI must use a Service Token:
# Zero Trust → Access → Applications → your SSH app → Service Auth policy, then
# store the token's Client ID and Client Secret as the two secrets above.
# Without them, cloudflared access ssh cannot authenticate and times out at banner.
# =============================================================================

name: 'Setup SSH via Cloudflare Tunnel'
description: 'Install cloudflared, configure SSH with retry logic, and verify tunnel connectivity'

inputs:
  ssh-key:
    description: 'SSH private key (raw PEM format)'
    required: false
  ssh-key-b64:
    description: 'SSH private key (base64-encoded) — preferred over ssh-key to avoid line-ending issues'
    required: false
  production-host:
    description: 'Production VM hostname (Cloudflare Tunnel hostname)'
    required: true
  ssh-user:
    description: 'SSH username on production VM'
    required: false
    default: 'mycosoft'
  cf-access-client-id:
    description: 'Cloudflare Access service token Client ID (for cloudflared access ssh in CI)'
    required: false
  cf-access-client-secret:
    description: 'Cloudflare Access service token Client Secret (pair with cf-access-client-id)'
    required: false
  require-cloudflare-access:
    description: 'If true, fail validation when CF_ACCESS_CLIENT_ID or CF_ACCESS_CLIENT_SECRET is empty (avoids long SSH banner timeouts)'
    required: false
    default: 'false'

outputs:
  ssh-user:
    description: 'The SSH user that was configured'
    value: ${{ steps.validate.outputs.user }}

runs:
  using: 'composite'
  steps:
    - name: Validate deploy secrets
      id: validate
      shell: bash
      env:
        SSH_KEY: ${{ inputs.ssh-key }}
        SSH_KEY_B64: ${{ inputs.ssh-key-b64 }}
        PRODUCTION_HOST: ${{ inputs.production-host }}
        SSH_USER: ${{ inputs.ssh-user }}
        CF_ACCESS_CLIENT_ID: ${{ inputs.cf-access-client-id }}
        CF_ACCESS_CLIENT_SECRET: ${{ inputs.cf-access-client-secret }}
        REQUIRE_CF_ACCESS: ${{ inputs.require-cloudflare-access }}
      run: |
        ERRORS=0

        # Check SSH key (prefer B64, fall back to raw)
        if [ -n "${SSH_KEY_B64}" ]; then
          echo "key_source=b64" >> "$GITHUB_OUTPUT"
          echo "Using SSH_KEY_B64 (base64-encoded key)"
        elif [ -n "${SSH_KEY}" ]; then
          echo "key_source=raw" >> "$GITHUB_OUTPUT"
          echo "Using SSH_KEY (raw PEM key)"
          # Validate it looks like a private key
          if ! echo "${SSH_KEY}" | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "::error::SSH_KEY does not contain a private key. Make sure you pasted the PRIVATE key (not the public .pub key)."
            echo "::error::Key should start with '-----BEGIN OPENSSH PRIVATE KEY-----' or '-----BEGIN RSA PRIVATE KEY-----'"
            ERRORS=$((ERRORS + 1))
          fi
        else
          echo "::error::Neither SSH_KEY nor SSH_KEY_B64 secret is configured. Set one in Settings → Secrets and variables → Actions."
          ERRORS=$((ERRORS + 1))
        fi

        # Check production host
        if [ -z "${PRODUCTION_HOST}" ]; then
          echo "::error::PRODUCTION_HOST secret is not configured. This should be your Cloudflare Tunnel hostname."
          ERRORS=$((ERRORS + 1))
        else
          echo "Production host: ${PRODUCTION_HOST}"
        fi

        echo "user=${SSH_USER:-mycosoft}" >> "$GITHUB_OUTPUT"

        if [ "${REQUIRE_CF_ACCESS}" = "true" ]; then
          if [ -z "${CF_ACCESS_CLIENT_ID}" ] || [ -z "${CF_ACCESS_CLIENT_SECRET}" ]; then
            echo "::error::CF_ACCESS_CLIENT_ID and CF_ACCESS_CLIENT_SECRET are required for this job but one or both are empty."
            echo "::error::They are not the VM SSH password — create a Cloudflare Zero Trust Service Auth token and add both values as GitHub Actions secrets."
            echo "::error::Zero Trust → Access → Applications → (SSH/tunnel app) → Policies → allow Service Auth, or Access → Service Auth."
            echo "::error::If the job uses environment: production or staging, add the secrets under that environment too (not only repository secrets)."
            ERRORS=$((ERRORS + 1))
          else
            echo "Cloudflare Access service token: both Client ID and Secret are set"
          fi
        fi

        if [ $ERRORS -gt 0 ]; then
          echo "::error::${ERRORS} secret(s) missing or invalid — cannot deploy. Check GitHub Settings → Secrets and variables → Actions."
          exit 1
        fi
        echo "All deploy secrets validated"

    - name: Install cloudflared
      shell: bash
      run: |
        echo "Installing cloudflared..."
        curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
        sudo dpkg -i /tmp/cloudflared.deb
        rm /tmp/cloudflared.deb
        echo "cloudflared version: $(cloudflared --version)"

    - name: Configure SSH key and config
      shell: bash
      env:
        SSH_KEY: ${{ inputs.ssh-key }}
        SSH_KEY_B64: ${{ inputs.ssh-key-b64 }}
        PRODUCTION_HOST: ${{ inputs.production-host }}
        SSH_USER: ${{ steps.validate.outputs.user }}
        KEY_SOURCE: ${{ steps.validate.outputs.key_source }}
        CF_ACCESS_CLIENT_ID: ${{ inputs.cf-access-client-id }}
        CF_ACCESS_CLIENT_SECRET: ${{ inputs.cf-access-client-secret }}
      run: |
        mkdir -p ~/.ssh

        # Write SSH key — prefer B64 to avoid line-ending corruption
        if [ "${KEY_SOURCE}" = "b64" ]; then
          echo "${SSH_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          echo "SSH key decoded from base64"
        else
          echo "${SSH_KEY}" > ~/.ssh/deploy_key
          echo "SSH key written from raw PEM"
        fi
        chmod 600 ~/.ssh/deploy_key

        # Validate the key file is readable by ssh
        if ! ssh-keygen -l -f ~/.ssh/deploy_key > /dev/null 2>&1; then
          echo "::error::SSH key file is malformed. 'ssh-keygen -l' failed to read it."
          echo "::error::If using SSH_KEY (raw), try SSH_KEY_B64 instead: cat ~/.ssh/id_ed25519 | base64 -w 0"
          # Show first/last lines for debugging (safe — these are just markers)
          head -1 ~/.ssh/deploy_key
          tail -1 ~/.ssh/deploy_key
          exit 1
        fi
        echo "SSH key fingerprint: $(ssh-keygen -l -f ~/.ssh/deploy_key)"

        # ProxyCommand: Access-protected SSH needs a Service Auth token in CI.
        # Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/use-cases/ssh/ssh-cloudflared-authentication/
        # Use a wrapper script + sidecar files so secrets with special chars never break ssh_config / sh -c parsing.
        CF_PROXY="${HOME}/.ssh/cf-access-ssh-proxy.sh"
        if [ -n "${CF_ACCESS_CLIENT_ID:-}" ] && [ -n "${CF_ACCESS_CLIENT_SECRET:-}" ]; then
          printf '%s' "${CF_ACCESS_CLIENT_ID}" > ~/.ssh/cf_access_client_id
          printf '%s' "${CF_ACCESS_CLIENT_SECRET}" > ~/.ssh/cf_access_client_secret
          chmod 600 ~/.ssh/cf_access_client_id ~/.ssh/cf_access_client_secret
          {
            echo '#!/usr/bin/env bash'
            echo 'set -euo pipefail'
            echo 'H="${1:-}"'
            echo 'ID="$(cat "${HOME}/.ssh/cf_access_client_id")"'
            echo 'SEC="$(cat "${HOME}/.ssh/cf_access_client_secret")"'
            echo 'export CLOUDFLARE_ACCESS_CLIENT_ID="${ID}" CLOUDFLARE_ACCESS_CLIENT_SECRET="${SEC}"'
            echo 'exec cloudflared access ssh --hostname "$H" --id "${ID}" --secret "${SEC}"'
          } > "${CF_PROXY}"
          chmod 700 "${CF_PROXY}"
          echo "Using Cloudflare Access service token (proxy script + --id/--secret from files)."
        else
          rm -f ~/.ssh/cf_access_client_id ~/.ssh/cf_access_client_secret 2>/dev/null || true
          {
            echo '#!/usr/bin/env bash'
            echo 'set -euo pipefail'
            echo 'exec cloudflared access ssh --hostname "${1:-}"'
          } > "${CF_PROXY}"
          chmod 700 "${CF_PROXY}"
          echo "::warning::CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET not set. If this host uses Cloudflare Access in front of SSH, add both as GitHub Actions secrets (Zero Trust → Access → Service Auth). Without them, SSH often times out at banner exchange."
        fi

        # Write ssh_config via echo — heredoc body at column 0 breaks YAML in composite actions
        {
          echo "Host production"
          echo "  HostName ${PRODUCTION_HOST}"
          echo "  User ${SSH_USER}"
          echo "  IdentityFile ~/.ssh/deploy_key"
          echo "  StrictHostKeyChecking no"
          echo "  UserKnownHostsFile /dev/null"
          echo "  ProxyCommand ${CF_PROXY} %h"
          echo "  ConnectTimeout 60"
          echo "  ConnectionAttempts 3"
          echo "  ServerAliveInterval 30"
          echo "  ServerAliveCountMax 6"
        } > ~/.ssh/config
        chmod 600 ~/.ssh/config
        echo "SSH config written for host: ${PRODUCTION_HOST}"

    - name: Install ssh-retry wrapper
      shell: bash
      run: |
        # Write script with echo (heredoc + YAML indent breaks manifest parse; indented EOF breaks bash)
        {
          echo '#!/usr/bin/env bash'
          echo '# SSH retry wrapper with exponential backoff for Cloudflare Tunnel connections.'
          echo '# Tunnels can take 30-90s to re-establish after network disruptions.'
          echo 'MAX_ATTEMPTS=5'
          echo 'DELAY=20'
          echo 'last_rc=255'
          echo 'for attempt in $(seq 1 $MAX_ATTEMPTS); do'
          echo '  echo "SSH attempt $attempt/$MAX_ATTEMPTS..."'
          echo '  ssh "$@"'
          echo '  last_rc=$?'
          echo '  if [ "$last_rc" -eq 0 ]; then'
          echo '    exit 0'
          echo '  fi'
          echo '  if [ "$attempt" -lt $MAX_ATTEMPTS ]; then'
          echo '    echo "SSH failed (exit $last_rc), retrying in ${DELAY}s..."'
          echo '    sleep "$DELAY"'
          echo '    DELAY=$((DELAY * 2))'
          echo '  fi'
          echo 'done'
          echo 'echo "::error::SSH failed after $MAX_ATTEMPTS attempts (last exit code: $last_rc)"'
          echo 'echo "::error::Possible causes:"'
          echo 'echo "::error::  1. Cloudflare Tunnel not running on VM — SSH to VM directly and run: sudo systemctl restart cloudflared"'
          echo 'echo "::error::  2. PRODUCTION_HOST / STAGING_HOST secret is wrong — verify it matches your Cloudflare Tunnel hostname"'
          echo 'echo "::error::  3. SSH_KEY is invalid or does not match the VM authorized_keys"'
          echo 'echo "::error::  4. VM is powered off or unreachable on the network"'
          echo 'echo "::error::  5. SSH behind Cloudflare Access — set CF_ACCESS_CLIENT_ID and CF_ACCESS_CLIENT_SECRET (Service Auth token) in repo secrets"'
          echo 'exit 1'
        } | sudo tee /usr/local/bin/ssh-retry > /dev/null
        sudo chmod +x /usr/local/bin/ssh-retry

    - name: Verify tunnel connectivity
      shell: bash
      run: |
        echo "=== Testing Cloudflare Tunnel Connectivity ==="
        echo "cloudflared version: $(cloudflared --version)"
        echo "Target host: $(grep HostName ~/.ssh/config | awk '{print $2}')"
        echo "Target user: $(grep 'User ' ~/.ssh/config | awk '{print $2}')"
        echo ""
        ssh-retry production 'echo "Tunnel OK — hostname=$(hostname) — ip=$(hostname -I | awk "{print \$1}") — date=$(date)"'
