# =============================================================================
# Mycosoft website-proxy — blue/green upstream switcher
# =============================================================================
# The active slot is written to /etc/nginx/state/active-slot by the deploy
# script. Changing that file + `nginx -s reload` flips traffic with ZERO
# dropped connections (existing requests finish on the old upstream).
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 16384;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  server_tokens off;

  # Logging — DO NOT reference $slot here; $slot is declared at server
  # level via `set $slot __ACTIVE_SLOT__;` and is NOT visible in http
  # context, which causes `nginx -t` to fail with "unknown variable".
  # The upstream_addr already tells us which slot served the request.
  log_format main '$remote_addr $host "$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" upstream=$upstream_addr '
                  'rt=$request_time urt=$upstream_response_time';
  access_log /var/log/nginx/access.log main buffer=32k flush=1s;
  error_log  /var/log/nginx/error.log warn;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 75s;
  keepalive_requests 1000;
  types_hash_max_size 2048;

  # Proxy buffering for RSC / streamed responses
  proxy_buffering off;          # Next.js RSC streams — don't buffer
  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;
  proxy_connect_timeout 10s;

  # Gzip (Cloudflare also compresses, but origin compresses for non-CF paths)
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             application/xml+rss application/xml image/svg+xml font/woff2;

  # Docker embedded DNS — required so nginx resolves `website-blue` /
  # `website-green` at request time, not startup. Without this, nginx
  # fails to boot when the target slot isn't running yet (classic chicken-
  # and-egg: proxy tries to resolve upstream before upstream is ready).
  resolver 127.0.0.11 valid=5s ipv6=off;
  resolver_timeout 5s;

  # $slot is declared via `set $slot __ACTIVE_SLOT__;` in
  # conf.d/website.conf.template (rendered per-cutover). DO NOT declare
  # it here with `map` — that causes "variable already declared" and
  # `nginx -t` fails, blocking every subsequent blue/green cutover.

  # Upstreams are resolved via a runtime variable in the server block (see
  # conf.d/website.conf.template). No static `upstream {}` blocks — those
  # would resolve at startup and crash nginx if the slot isn't up yet.

  include /etc/nginx/conf.d/*.conf;
}
