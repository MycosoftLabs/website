# =============================================================================
# Mycosoft website-proxy — blue/green upstream switcher
# =============================================================================
# The active slot is written to /etc/nginx/state/active-slot by the deploy
# script. Changing that file + `nginx -s reload` flips traffic with ZERO
# dropped connections (existing requests finish on the old upstream).
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 16384;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  server_tokens off;

  # Logging
  log_format main '$remote_addr $host "$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" upstream=$upstream_addr '
                  'rt=$request_time urt=$upstream_response_time slot=$slot';
  access_log /var/log/nginx/access.log main buffer=32k flush=1s;
  error_log  /var/log/nginx/error.log warn;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 75s;
  keepalive_requests 1000;
  types_hash_max_size 2048;

  # Proxy buffering for RSC / streamed responses
  proxy_buffering off;          # Next.js RSC streams — don't buffer
  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;
  proxy_connect_timeout 10s;

  # Gzip (Cloudflare also compresses, but origin compresses for non-CF paths)
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             application/xml+rss application/xml image/svg+xml font/woff2;

  # Load the active-slot file into an nginx variable at config evaluation time.
  # The file contains literally `blue\n` or `green\n`.
  map $host $slot {
    default "BOOT";
  }

  # Upstreams — one per slot. Keepalive pool for perf.
  upstream website_blue {
    server website-blue:3000 max_fails=3 fail_timeout=10s;
    keepalive 64;
  }
  upstream website_green {
    server website-green:3000 max_fails=3 fail_timeout=10s;
    keepalive 64;
  }

  include /etc/nginx/conf.d/*.conf;
}
