<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fuselageG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff6d9"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#c88914"/>
    </linearGradient>
    <linearGradient id="wingG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c88914"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#c88914"/>
    </linearGradient>
    <radialGradient id="cockpitG" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Main wings — swept back, wide -->
  <g filter="url(#shadow)">
    <path d="M32 26 L2 40 L2 45 L32 37 L62 45 L62 40 Z"
          fill="url(#wingG)" stroke="#7a5008" stroke-width="0.8"/>
    <!-- Wingtip tips -->
    <circle cx="3" cy="42.5" r="1.2" fill="#b45309"/>
    <circle cx="61" cy="42.5" r="1.2" fill="#b45309"/>
    <!-- Engine nacelles (left + right) -->
    <ellipse cx="18" cy="39.5" rx="3.2" ry="2.2" fill="#27272a" stroke="#18181b" stroke-width="0.4"/>
    <ellipse cx="46" cy="39.5" rx="3.2" ry="2.2" fill="#27272a" stroke="#18181b" stroke-width="0.4"/>
    <circle cx="18" cy="39.5" r="1.2" fill="#52525b"/>
    <circle cx="46" cy="39.5" r="1.2" fill="#52525b"/>
  </g>

  <!-- Fuselage -->
  <g filter="url(#shadow)">
    <path d="M32 4
             C34.5 4 35.5 7 35.5 12
             L35.5 50
             C35.5 54 34.5 57 32 58
             C29.5 57 28.5 54 28.5 50
             L28.5 12
             C28.5 7 29.5 4 32 4 Z"
          fill="url(#fuselageG)" stroke="#7a5008" stroke-width="0.7"/>
    <!-- Cockpit window -->
    <ellipse cx="32" cy="9" rx="2" ry="2.8" fill="url(#cockpitG)" stroke="#0c4a6e" stroke-width="0.4"/>
    <!-- Cabin windows (row of circles) -->
    <g fill="#0c4a6e">
      <circle cx="30" cy="18" r="0.6"/>
      <circle cx="34" cy="18" r="0.6"/>
      <circle cx="30" cy="22" r="0.6"/>
      <circle cx="34" cy="22" r="0.6"/>
      <circle cx="30" cy="26" r="0.6"/>
      <circle cx="34" cy="26" r="0.6"/>
      <circle cx="30" cy="30" r="0.6"/>
      <circle cx="34" cy="30" r="0.6"/>
      <circle cx="30" cy="34" r="0.6"/>
      <circle cx="34" cy="34" r="0.6"/>
      <circle cx="30" cy="38" r="0.6"/>
      <circle cx="34" cy="38" r="0.6"/>
      <circle cx="30" cy="42" r="0.6"/>
      <circle cx="34" cy="42" r="0.6"/>
    </g>
    <!-- Fuselage stripe -->
    <line x1="32" y1="8" x2="32" y2="56" stroke="#fef3c7" stroke-width="0.4" opacity="0.7"/>
  </g>

  <!-- Tail (vertical stabilizer) -->
  <g filter="url(#shadow)">
    <path d="M32 47 L27 59 L28 60 L32 54 L36 60 L37 59 Z"
          fill="url(#wingG)" stroke="#7a5008" stroke-width="0.6"/>
    <!-- Horizontal stabilizers -->
    <path d="M32 52 L22 57 L22 58.5 L32 55 L42 58.5 L42 57 Z"
          fill="url(#wingG)" stroke="#7a5008" stroke-width="0.5"/>
  </g>

  <!-- Navigation lights -->
  <circle cx="3" cy="42.5" r="0.6" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="61" cy="42.5" r="0.6" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
