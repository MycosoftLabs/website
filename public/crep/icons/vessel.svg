<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="hullG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="deckG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="bridgeG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="vShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Wake (water trail behind ship) -->
  <path d="M22 56 L18 62 L46 62 L42 56 Z" fill="#bae6fd" opacity="0.35"/>
  <path d="M24 55 L21 61 L43 61 L40 55 Z" fill="#e0f2fe" opacity="0.5"/>

  <!-- Hull (pointed bow up) -->
  <g filter="url(#vShadow)">
    <path d="M32 4
             L40 16
             L43 52
             L39 56
             L25 56
             L21 52
             L24 16 Z"
          fill="url(#hullG)" stroke="#0c4a6e" stroke-width="0.8"/>
    <!-- Waterline -->
    <path d="M23.5 44 L40.5 44 L41 50 L23 50 Z" fill="#0c4a6e" opacity="0.35"/>
    <!-- Hull stripe -->
    <line x1="24" y1="34" x2="40" y2="34" stroke="#fef3c7" stroke-width="0.6" opacity="0.8"/>
  </g>

  <!-- Main deck (flat top of hull) -->
  <g filter="url(#vShadow)">
    <path d="M25 16 L39 16 L41 34 L23 34 Z" fill="url(#deckG)" stroke="#475569" stroke-width="0.5"/>
    <!-- Cargo holds / hatches -->
    <rect x="28" y="20" width="8" height="4" fill="#475569" rx="0.5"/>
    <rect x="28" y="27" width="8" height="4" fill="#475569" rx="0.5"/>
  </g>

  <!-- Superstructure / bridge (white block forward) -->
  <g filter="url(#vShadow)">
    <rect x="27" y="10" width="10" height="10" fill="url(#bridgeG)" stroke="#78350f" stroke-width="0.5" rx="0.5"/>
    <!-- Bridge windows (row of dark squares) -->
    <rect x="28" y="12" width="2" height="2" fill="#0c4a6e"/>
    <rect x="31" y="12" width="2" height="2" fill="#0c4a6e"/>
    <rect x="34" y="12" width="2" height="2" fill="#0c4a6e"/>
    <!-- Top row bridge deck -->
    <rect x="29" y="6" width="6" height="5" fill="#fef9c3" stroke="#78350f" stroke-width="0.4" rx="0.5"/>
  </g>

  <!-- Smokestack -->
  <g filter="url(#vShadow)">
    <rect x="30.5" y="36" width="3" height="7" fill="#334155" stroke="#0f172a" stroke-width="0.4"/>
    <rect x="30.5" y="35" width="3" height="1" fill="#1f2937"/>
    <!-- Red band (classic ship stack) -->
    <rect x="30.5" y="37.5" width="3" height="1.5" fill="#dc2626"/>
  </g>

  <!-- Mast forward -->
  <line x1="32" y1="6" x2="32" y2="2" stroke="#e2e8f0" stroke-width="0.8"/>
  <circle cx="32" cy="2" r="0.8" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Navigation lights (port=red, starboard=green) -->
  <circle cx="25" cy="17" r="0.7" fill="#ef4444"/>
  <circle cx="39" cy="17" r="0.7" fill="#22c55e"/>

  <!-- Lifeboats -->
  <ellipse cx="25" cy="26" rx="1.2" ry="2.8" fill="#ea580c" stroke="#9a3412" stroke-width="0.4"/>
  <ellipse cx="39" cy="26" rx="1.2" ry="2.8" fill="#ea580c" stroke="#9a3412" stroke-width="0.4"/>

  <!-- Anchor symbol on bow -->
  <path d="M32 8 L31.2 9.6 L32 11.2 L32.8 9.6 Z" fill="#f1f5f9" opacity="0.8"/>
</svg>
