<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <!-- Solar panels: dark blue with cell grid -->
    <linearGradient id="panelG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0c1f53"/>
    </linearGradient>
    <pattern id="solarCells" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#1e40af"/>
      <rect width="2.6" height="2.6" x="0.2" y="0.2" fill="#2563eb"/>
      <line x1="0" y1="0" x2="3" y2="0" stroke="#0c1f53" stroke-width="0.2"/>
      <line x1="0" y1="0" x2="0" y2="3" stroke="#0c1f53" stroke-width="0.2"/>
    </pattern>
    <!-- Body: silver/gold foil -->
    <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <radialGradient id="dishG" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#64748b"/>
    </radialGradient>
    <filter id="satShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Solar panel supports (boom arms) -->
  <rect x="2" y="31" width="60" height="2" fill="#334155" filter="url(#satShadow)"/>

  <!-- Left solar panel array (3 panels) -->
  <g filter="url(#satShadow)">
    <rect x="2" y="22" width="22" height="20" fill="url(#solarCells)" stroke="#0c1f53" stroke-width="0.6"/>
    <!-- Panel grid lines -->
    <line x1="9" y1="22" x2="9" y2="42" stroke="#0c1f53" stroke-width="0.3"/>
    <line x1="16" y1="22" x2="16" y2="42" stroke="#0c1f53" stroke-width="0.3"/>
    <line x1="2" y1="29" x2="24" y2="29" stroke="#0c1f53" stroke-width="0.3"/>
    <line x1="2" y1="36" x2="24" y2="36" stroke="#0c1f53" stroke-width="0.3"/>
  </g>

  <!-- Right solar panel array -->
  <g filter="url(#satShadow)">
    <rect x="40" y="22" width="22" height="20" fill="url(#solarCells)" stroke="#0c1f53" stroke-width="0.6"/>
    <line x1="47" y1="22" x2="47" y2="42" stroke="#0c1f53" stroke-width="0.3"/>
    <line x1="54" y1="22" x2="54" y2="42" stroke="#0c1f53" stroke-width="0.3"/>
    <line x1="40" y1="29" x2="62" y2="29" stroke="#0c1f53" stroke-width="0.3"/>
    <line x1="40" y1="36" x2="62" y2="36" stroke="#0c1f53" stroke-width="0.3"/>
  </g>

  <!-- Main satellite body (gold-foil wrapped) -->
  <g filter="url(#satShadow)">
    <rect x="24" y="22" width="16" height="20" rx="1.5" fill="url(#bodyG)" stroke="#6b3a0a" stroke-width="0.7"/>
    <!-- Foil highlight -->
    <rect x="25" y="24" width="2" height="16" fill="#fef3c7" opacity="0.7"/>
    <!-- Panel seams -->
    <line x1="24" y1="28" x2="40" y2="28" stroke="#6b3a0a" stroke-width="0.3"/>
    <line x1="24" y1="34" x2="40" y2="34" stroke="#6b3a0a" stroke-width="0.3"/>
    <!-- Central mission module -->
    <rect x="28" y="30" width="8" height="4" fill="#1f2937" rx="0.5" stroke="#111827" stroke-width="0.3"/>
    <circle cx="32" cy="32" r="1" fill="#22d3ee"/>
  </g>

  <!-- Communication dish (top) -->
  <g filter="url(#satShadow)">
    <ellipse cx="32" cy="16" rx="7" ry="2.5" fill="url(#dishG)" stroke="#334155" stroke-width="0.6"/>
    <ellipse cx="32" cy="15.5" rx="5.5" ry="1.8" fill="#cbd5e1" opacity="0.9"/>
    <!-- Dish strut -->
    <line x1="32" y1="17" x2="32" y2="22" stroke="#334155" stroke-width="1.2"/>
    <!-- Feed horn -->
    <rect x="31" y="12" width="2" height="2" fill="#475569"/>
  </g>

  <!-- Antennas (bottom) -->
  <g stroke="#e2e8f0" stroke-width="0.7" filter="url(#satShadow)">
    <line x1="28" y1="42" x2="26" y2="50"/>
    <line x1="32" y1="42" x2="32" y2="52"/>
    <line x1="36" y1="42" x2="38" y2="50"/>
    <circle cx="26" cy="50" r="0.8" fill="#fbbf24"/>
    <circle cx="32" cy="52" r="0.8" fill="#fbbf24"/>
    <circle cx="38" cy="50" r="0.8" fill="#fbbf24"/>
  </g>

  <!-- Status blink -->
  <circle cx="32" cy="32" r="0.6" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
</svg>
