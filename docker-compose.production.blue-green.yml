# =============================================================================
# Mycosoft Production — BLUE/GREEN ZERO-DOWNTIME OVERLAY
# =============================================================================
# Apply ON TOP OF docker-compose.production.yml:
#
#   docker compose \
#     -f docker-compose.production.yml \
#     -f docker-compose.production.blue-green.yml \
#     up -d website-proxy website-blue
#
# Architecture:
#   cloudflared → website-proxy:3000 (nginx) → active slot (blue or green)
#     proxy reads /opt/mycosoft/state/active-slot (contents: "blue" or "green")
#
# The single "website" service is REMOVED from the active topology. The proxy
# is what cloudflared targets, so the public endpoint never blinks even while
# the idle slot is being rebuilt.
#
# Cutover is performed by scripts/blue-green-deploy.sh (NOT docker compose up).
# =============================================================================

services:
  # ───────────────────────────────────────────────────────────────────────────
  # cloudflared — OVERRIDE base file's depends_on to point at the proxy, not the
  # legacy `website` service (which we no longer start). Without this override,
  # compose rejects the project as invalid once `website` is profile-gated.
  # ───────────────────────────────────────────────────────────────────────────
  cloudflared:
    depends_on:
      website-proxy:
        condition: service_healthy

  # ───────────────────────────────────────────────────────────────────────────
  # NGINX — stable public endpoint; reverse-proxies to whichever slot is active
  # ───────────────────────────────────────────────────────────────────────────
  website-proxy:
    image: nginx:1.27-alpine
    container_name: mycosoft-website-proxy
    restart: always
    ports:
      - "3000:80" # cloudflared tunnel target — UNCHANGED (still :3000)
    volumes:
      - /opt/mycosoft/state:/etc/nginx/state:ro
      - /opt/mycosoft/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/mycosoft/nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      # Use 127.0.0.1 — Alpine wget resolves `localhost` to ::1 first; nginx listens on IPv4 only.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - mycosoft-network
    labels:
      - "com.mycosoft.service=website-proxy"
      - "com.mycosoft.critical=true"
      - "autoheal=true"

  # ───────────────────────────────────────────────────────────────────────────
  # AUTOHEAL — restarts ANY container labelled autoheal=true that Docker has
  # marked `unhealthy`. THIS is the piece that was missing in the Jun 15 2026
  # outage: the app slots already have an /api/health healthcheck, but Docker
  # never restarts an UNHEALTHY (vs exited) container, so a HUNG app served 504
  # indefinitely until a human redeployed (~50 min down). With autoheal a hung
  # slot self-recovers in ~30-90s, no human. It only ACTS on already-unhealthy
  # containers (can't disturb healthy ones); start_period gives a freshly
  # cutover slot time to finish booting before it's eligible.
  # ───────────────────────────────────────────────────────────────────────────
  autoheal:
    image: willfarrell/autoheal:1.2.0
    container_name: mycosoft-autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10          # poll unhealthy state every 10s
      - AUTOHEAL_START_PERIOD=120     # ignore containers younger than 120s (booting)
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=20
      - DOCKER_SOCK=/var/run/docker.sock
      - TZ=UTC
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mycosoft-network
    labels:
      - "com.mycosoft.service=autoheal"
      - "com.mycosoft.critical=true"

  # ───────────────────────────────────────────────────────────────────────────
  # BLUE slot — steady-state production. No host port. Only the proxy talks to it.
  # ───────────────────────────────────────────────────────────────────────────
  website-blue:
    image: ${WEBSITE_IMAGE_BLUE:-${WEBSITE_IMAGE:-ghcr.io/mycosoftlabs/website:production-latest}}
    container_name: mycosoft-website-blue
    expose: ["3000"]
    env_file: [.env]
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Supabase auth uses chunked cookies; keep authenticated request headers accepted.
      - NODE_OPTIONS=${NODE_OPTIONS:---max-http-header-size=32768}
      - DEPLOY_SLOT=blue
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.3}
      - MAS_API_URL=${MAS_API_URL:-http://192.168.0.188:8001}
      - MINDEX_API_URL=${MINDEX_API_URL:-http://192.168.0.189:8000}
      - MINDEX_API_BASE_URL=${MINDEX_API_BASE_URL:-http://192.168.0.189:8000}
      - MINDEX_API_KEY=${MINDEX_API_KEY}
      - MINDEX_INTERNAL_TOKEN=${MINDEX_INTERNAL_TOKEN}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - INTEGRATIONS_ENABLED=${INTEGRATIONS_ENABLED:-true}
      - MYCOBRAIN_SERVICE_URL=${MYCOBRAIN_SERVICE_URL:-http://192.168.0.196:8003}
      - MYCOBRAIN_API_URL=${MYCOBRAIN_API_URL:-http://192.168.0.196:8003}
      - N8N_URL=${N8N_URL:-http://n8n:5678}
      - NEMOCLAW_GATEWAY_URL=${NEMOCLAW_GATEWAY_URL:-http://192.168.0.123:18789}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      # Auth vars come ONLY from env_file [.env] — do NOT interpolate from shell here.
      # Empty shell vars override env_file and break Supabase middleware (config_missing).
      # See docs/AUTH_ENV_DEPLOY_GUARD_MAY29_2026.md
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://mycosoft.com}
      # NEXTAUTH_SECRET — env_file only (see auth guard comment above)
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://mycosoft.com}
      - NEXT_PUBLIC_MAS_API_URL=${NEXT_PUBLIC_MAS_API_URL:-http://192.168.0.188:8001}
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    volumes:
      - /opt/mycosoft/media/website/assets:/app/public/assets:ro
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      ollama:   {condition: service_started}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - mycosoft-network
    labels:
      - "com.mycosoft.service=website"
      - "com.mycosoft.slot=blue"
      - "autoheal=true" # autoheal restarts this slot if /api/health goes unhealthy

  # ───────────────────────────────────────────────────────────────────────────
  # GREEN slot — idle most of the time. Deploy script pulls new image into
  # WEBSITE_IMAGE_GREEN and starts it. Profile keeps it off by default so
  # `docker compose up` (routine restart) doesn't start both.
  # ───────────────────────────────────────────────────────────────────────────
  website-green:
    image: ${WEBSITE_IMAGE_GREEN:-ghcr.io/mycosoftlabs/website:production-latest}
    container_name: mycosoft-website-green
    expose: ["3000"]
    env_file: [.env]
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Supabase auth uses chunked cookies; keep authenticated request headers accepted.
      - NODE_OPTIONS=${NODE_OPTIONS:---max-http-header-size=32768}
      - DEPLOY_SLOT=green
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.3}
      - MAS_API_URL=${MAS_API_URL:-http://192.168.0.188:8001}
      - MINDEX_API_URL=${MINDEX_API_URL:-http://192.168.0.189:8000}
      - MINDEX_API_BASE_URL=${MINDEX_API_BASE_URL:-http://192.168.0.189:8000}
      - MINDEX_API_KEY=${MINDEX_API_KEY}
      - MINDEX_INTERNAL_TOKEN=${MINDEX_INTERNAL_TOKEN}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - INTEGRATIONS_ENABLED=${INTEGRATIONS_ENABLED:-true}
      - MYCOBRAIN_SERVICE_URL=${MYCOBRAIN_SERVICE_URL:-http://192.168.0.196:8003}
      - MYCOBRAIN_API_URL=${MYCOBRAIN_API_URL:-http://192.168.0.196:8003}
      - N8N_URL=${N8N_URL:-http://n8n:5678}
      - NEMOCLAW_GATEWAY_URL=${NEMOCLAW_GATEWAY_URL:-http://192.168.0.123:18789}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      # Auth vars come ONLY from env_file [.env] — do NOT interpolate from shell here.
      # Empty shell vars override env_file and break Supabase middleware (config_missing).
      # See docs/AUTH_ENV_DEPLOY_GUARD_MAY29_2026.md
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://mycosoft.com}
      # NEXTAUTH_SECRET — env_file only (see auth guard comment above)
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://mycosoft.com}
      - NEXT_PUBLIC_MAS_API_URL=${NEXT_PUBLIC_MAS_API_URL:-http://192.168.0.188:8001}
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    volumes:
      - /opt/mycosoft/media/website/assets:/app/public/assets:ro
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      ollama:   {condition: service_started}
    profiles: ["green"] # only starts when `--profile green` is passed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - mycosoft-network
    labels:
      - "com.mycosoft.service=website"
      - "com.mycosoft.slot=green"
      - "autoheal=true" # autoheal restarts this slot if /api/health goes unhealthy

  # ───────────────────────────────────────────────────────────────────────────
  # The legacy `website` service from the base compose file is intentionally
  # NOT overridden here. Profile-gating it (as we previously tried) broke
  # compose validation because `cloudflared: depends_on: website` (from base)
  # resolves to a profile-gated service = "undefined service" at validation.
  #
  # Instead we leave `website` defined in the base file and just never start
  # it with `docker compose up`. The bootstrap script removes the running
  # `mycosoft-website` container via `docker rm`, and subsequent `compose up`
  # commands only target `website-blue`/`website-proxy`.
  # ───────────────────────────────────────────────────────────────────────────
